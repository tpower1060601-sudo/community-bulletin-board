<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>即時新聞看板</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #04080f;
  color: #fff;
  font-family: 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', sans-serif;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ── 4列佈局 ── */
.news-rows {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.news-row {
  flex: 1;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

/* ── 左側標籤 ── */
.row-label {
  flex-shrink: 0;
  width: 220px;
  padding: 0 20px 0 28px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  z-index: 2;
}

.label-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  border-radius: 10px;
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 1px;
  border: 1px solid;
  white-space: nowrap;
}

.label-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.28);
  letter-spacing: 3px;
  padding-left: 4px;
  text-transform: uppercase;
}

/* ── 漸層遮罩（左邊標籤右側淡出）── */
.row-label::after {
  content: '';
  position: absolute;
  left: 220px;
  top: 0; bottom: 0;
  width: 60px;
  z-index: 1;
  pointer-events: none;
}

/* ── 流動區 ── */
.ticker-wrap {
  flex: 1;
  overflow: hidden;
  height: 100%;
  display: flex;
  align-items: center;
  position: relative;
}

/* 左右遮罩 */
.ticker-wrap::before,
.ticker-wrap::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  width: 80px;
  z-index: 2;
  pointer-events: none;
}
.ticker-wrap::before { left: 0; }
.ticker-wrap::after  { right: 0; }

.ticker-track {
  display: flex;
  align-items: center;
  white-space: nowrap;
  will-change: transform;
  /* 動畫由 JS 依內容長度設定 */
}

@keyframes tickerScroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.ticker-item {
  display: inline-flex;
  align-items: center;
  font-size: 76px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 0 24px;
  flex-shrink: 0;
}

.ticker-sep {
  display: inline-block;
  font-size: 44px;
  opacity: .35;
  padding: 0 28px;
  flex-shrink: 0;
}

/* 載入提示 */
.ticker-loading {
  font-size: 28px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 4px;
  padding: 0 40px;
}

/* 即時指示燈 */
.live-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(1.4)} }

/* ── 各列色彩主題 ── */
.row-1 {
  background: linear-gradient(90deg, rgba(239,68,68,0.08) 0%, transparent 30%);
  border-left: 5px solid #ef4444;
}
.row-1 .label-badge { color:#ef4444; border-color:rgba(239,68,68,0.35); background:rgba(239,68,68,0.1); }
.row-1 .live-dot    { background:#ef4444; box-shadow:0 0 8px #ef4444; }
.row-1 .ticker-item { color: rgba(255,255,255,.92); }
.row-1 .ticker-sep  { color: #ef4444; }
.row-1 .ticker-wrap::before { background: linear-gradient(90deg, #04080f, transparent); }
.row-1 .ticker-wrap::after  { background: linear-gradient(270deg, #04080f, transparent); }

.row-2 {
  background: linear-gradient(90deg, rgba(16,185,129,0.08) 0%, transparent 30%);
  border-left: 5px solid #10b981;
}
.row-2 .label-badge { color:#10b981; border-color:rgba(16,185,129,0.35); background:rgba(16,185,129,0.1); }
.row-2 .live-dot    { background:#10b981; box-shadow:0 0 8px #10b981; }
.row-2 .ticker-item { color: rgba(255,255,255,.92); }
.row-2 .ticker-sep  { color: #10b981; }
.row-2 .ticker-wrap::before { background: linear-gradient(90deg, #04080f, transparent); }
.row-2 .ticker-wrap::after  { background: linear-gradient(270deg, #04080f, transparent); }

.row-3 {
  background: linear-gradient(90deg, rgba(56,189,248,0.08) 0%, transparent 30%);
  border-left: 5px solid #38bdf8;
}
.row-3 .label-badge { color:#38bdf8; border-color:rgba(56,189,248,0.35); background:rgba(56,189,248,0.1); }
.row-3 .live-dot    { background:#38bdf8; box-shadow:0 0 8px #38bdf8; }
.row-3 .ticker-item { color: rgba(255,255,255,.92); }
.row-3 .ticker-sep  { color: #38bdf8; }
.row-3 .ticker-wrap::before { background: linear-gradient(90deg, #04080f, transparent); }
.row-3 .ticker-wrap::after  { background: linear-gradient(270deg, #04080f, transparent); }

.row-4 {
  background: linear-gradient(90deg, rgba(251,191,36,0.08) 0%, transparent 30%);
  border-left: 5px solid #fbbf24;
}
.row-4 .label-badge { color:#fbbf24; border-color:rgba(251,191,36,0.35); background:rgba(251,191,36,0.1); }
.row-4 .live-dot    { background:#fbbf24; box-shadow:0 0 8px #fbbf24; }
.row-4 .ticker-item { color: rgba(255,255,255,.92); }
.row-4 .ticker-sep  { color: #fbbf24; }
.row-4 .ticker-wrap::before { background: linear-gradient(90deg, #04080f, transparent); }
.row-4 .ticker-wrap::after  { background: linear-gradient(270deg, #04080f, transparent); }

.row-5 {
  background: linear-gradient(90deg, rgba(168,85,247,0.10) 0%, transparent 30%);
  border-left: 5px solid #a855f7;
  border-bottom: none;
}
.row-5 .label-badge { color:#a855f7; border-color:rgba(168,85,247,0.4); background:rgba(168,85,247,0.12); }
.row-5 .live-dot    { background:#a855f7; box-shadow:0 0 8px #a855f7; }
.row-5 .ticker-item { color: rgba(255,255,255,.92); }
.row-5 .ticker-sep  { color: #a855f7; }
.row-5 .ticker-wrap::before { background: linear-gradient(90deg, #04080f, transparent); }
.row-5 .ticker-wrap::after  { background: linear-gradient(270deg, #04080f, transparent); }
</style>
</head>
<body>

<div class="news-rows">
  <div class="news-row row-1">
    <div class="row-label">
      <div class="label-badge"><span class="live-dot"></span>公視即時新聞</div>
      <div class="label-sub">PTS LIVE NEWS</div>
    </div>
    <div class="ticker-wrap" id="w0">
      <div class="ticker-track" id="t0">
        <span class="ticker-loading">連線中…</span>
      </div>
    </div>
  </div>

  <div class="news-row row-2">
    <div class="row-label">
      <div class="label-badge"><span class="live-dot"></span>台灣財經新聞</div>
      <div class="label-sub">TW FINANCE</div>
    </div>
    <div class="ticker-wrap" id="w1">
      <div class="ticker-track" id="t1">
        <span class="ticker-loading">連線中…</span>
      </div>
    </div>
  </div>

  <div class="news-row row-3">
    <div class="row-label">
      <div class="label-badge"><span class="live-dot"></span>國際即時新聞</div>
      <div class="label-sub">WORLD NEWS</div>
    </div>
    <div class="ticker-wrap" id="w2">
      <div class="ticker-track" id="t2">
        <span class="ticker-loading">連線中…</span>
      </div>
    </div>
  </div>

  <div class="news-row row-4">
    <div class="row-label">
      <div class="label-badge"><span class="live-dot"></span>國際財經新聞</div>
      <div class="label-sub">GLOBAL FINANCE</div>
    </div>
    <div class="ticker-wrap" id="w3">
      <div class="ticker-track" id="t3">
        <span class="ticker-loading">連線中…</span>
      </div>
    </div>
  </div>

  <div class="news-row row-5">
    <div class="row-label">
      <div class="label-badge"><span class="live-dot"></span>股市即時</div>
      <div class="label-sub">STOCK MARKET</div>
    </div>
    <div class="ticker-wrap" id="w4">
      <div class="ticker-track" id="t4">
        <span class="ticker-loading">連線中…</span>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

/* ── RSS 來源 ── */
const FEEDS = [
  [
    'https://news.pts.org.tw/xml/newsfeed.xml',
    'https://about.pts.org.tw/rss/XML/newsfeed.xml',
    'https://feeds.bbci.co.uk/zhongwen/trad/rss.xml'
  ],
  [
    'https://tw.news.yahoo.com/rss/finance',
    'https://www.cna.com.tw/rss/afe.aspx',
    'https://ec.ltn.com.tw/rss/news.xml'
  ],
  [
    'https://feeds.bbci.co.uk/news/world/rss.xml',
    'https://www.theguardian.com/world/rss',
    'https://news.google.com/rss/search?q=site:cnn.com+when:1d&hl=en-US&gl=US&ceid=US:en'
  ],
  [
    'https://feeds.bbci.co.uk/news/business/rss.xml',
    'https://feeds.bbci.co.uk/news/world/rss.xml',
    'https://feeds.bbci.co.uk/news/rss.xml'
  ],
  [
    'https://tw.stock.yahoo.com/rss?category=tw-market',
    'https://money.udn.com/rssfeed/news/1001/5590/5599?ch=money',
    'https://www.moneydj.com/rss/rss.aspx?type=mainnews'
  ]
];

const PROXIES = [
  url => `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`
];

const REFETCH  = 5 * 60 * 1000;
/* 每列滾動速度（像素/秒）；股市那列調快 */
const PX_PER_S = [40, 40, 40, 40, 90];
const SEP      = '　◆　';

/* ── XML 解析 ── */
function parseXmlTitles(xmlText) {
  try {
    const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
    const items = doc.querySelectorAll('item title, entry title');
    const titles = [];
    items.forEach(el => {
      const t = el.textContent.trim();
      if (t && t !== 'undefined' && t.length > 2) titles.push(t);
    });
    return titles;
  } catch(e) { return []; }
}

/* ── 單次請求 ── */
async function tryOne(proxyIdx, feedUrl) {
  const res = await fetch(PROXIES[proxyIdx](feedUrl), { cache: 'no-cache' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  if (proxyIdx === 0) {
    const data = JSON.parse(text);
    if (data.status === 'ok' && data.items && data.items.length)
      return data.items.map(i => i.title || '').filter(t => t.length > 2);
    throw new Error('rss2json: ' + data.status);
  }
  if (proxyIdx === 1) {
    const json = JSON.parse(text);
    const titles = parseXmlTitles(json.contents || '');
    if (titles.length) return titles;
    throw new Error('allorigins no titles');
  }
  const titles = parseXmlTitles(text);
  if (titles.length) return titles;
  throw new Error('corsproxy no titles');
}

/* ── 拉取並更新 ── */
async function fetchRow(ri) {
  for (const feedUrl of FEEDS[ri]) {
    for (let pi = 0; pi < PROXIES.length; pi++) {
      try {
        const titles = await tryOne(pi, feedUrl);
        if (titles.length) { renderTicker(ri, titles); return; }
      } catch(e) { /* 繼續 */ }
    }
  }
  /* 全部失敗：保留現有內容，30 秒後重試 */
  setTimeout(() => fetchRow(ri), 30000);
}

/* ── 渲染跑馬燈 ── */
function renderTicker(ri, titles) {
  const track = document.getElementById('t' + ri);
  const wrap  = document.getElementById('w' + ri);

  /* 停止舊動畫 */
  track.style.animation = 'none';
  track.style.transform = 'translateX(0)';

  /* 產生一組內容 */
  const frag = document.createDocumentFragment();
  titles.forEach((title, i) => {
    const span = document.createElement('span');
    span.className = 'ticker-item';
    span.textContent = title;
    frag.appendChild(span);
    const sep = document.createElement('span');
    sep.className = 'ticker-sep';
    sep.textContent = SEP;
    frag.appendChild(sep);
  });

  /* 清空並填入內容×2（無縫銜接用）*/
  track.innerHTML = '';
  const half1 = document.createElement('span');
  half1.style.display = 'contents';
  const half2 = document.createElement('span');
  half2.style.display = 'contents';
  const nodes1 = frag.cloneNode(true);
  half1.appendChild(nodes1);
  const nodes2 = frag.cloneNode(true);
  half2.appendChild(nodes2);
  track.appendChild(half1);
  track.appendChild(half2);

  /* 下一幀量測寬度後設定動畫 */
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const fullW = track.scrollWidth / 2;   /* 單組寬度 */
      if (fullW < 10) return;
      const speed = Array.isArray(PX_PER_S) ? (PX_PER_S[ri] || 40) : PX_PER_S;
      const dur = (fullW / speed).toFixed(2);
      track.style.animation = `tickerScroll ${dur}s linear infinite`;
    });
  });
}

/* ── 初始化 ── */
FEEDS.forEach((_, i) => fetchRow(i));
setInterval(() => FEEDS.forEach((_, i) => fetchRow(i)), REFETCH);
</script>
</body>
</html>
