<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>螢幕牆</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; }
#wall { position:absolute; top:0; left:0; width:5760px; height:2160px; transform-origin:0 0; }
.wall-frame { position:absolute; border:0; background:#000; }
</style>
</head>
<body>
<div id="wall"></div>

<script src="../../shared/api.js"></script>
<script src="../../shared/screenDefs.js"></script>
<script>
'use strict';

var STAGGER_MS = 3000; // 每格延遲載入間隔，避免同時發起多條連線（尤其 YouTube 兩格）

function frameSrc(screenId) {
  return '../' + screenId + '/';
}

var pendingTimers = [];

function renderWall(layout) {
  pendingTimers.forEach(function(id){ clearTimeout(id); });
  pendingTimers = [];

  var wall = document.getElementById('wall');
  wall.innerHTML = '';
  var defs = window.ScreenDefs.SCREEN_DEFS;

  layout.forEach(function(w, i) {
    var def = null;
    for (var j = 0; j < defs.length; j++) {
      if (defs[j].id === w.screenId) { def = defs[j]; break; }
    }
    if (!def) {
      console.warn('[wall] unknown screenId in layout:', w.screenId);
      return;
    }

    // 畫布左上角對應實體座標 (-1920, -1080)
    var left = w.physX + 1920;
    var top  = w.physY + 1080;

    var iframe = document.createElement('iframe');
    iframe.className = 'wall-frame';
    iframe.setAttribute('allow', 'autoplay');
    iframe.style.left = left + 'px';
    iframe.style.top = top + 'px';
    iframe.style.width = def.w + 'px';
    iframe.style.height = def.h + 'px';
    wall.appendChild(iframe);

    var timerId = setTimeout(function() {
      iframe.src = frameSrc(def.id);
    }, i * STAGGER_MS);
    pendingTimers.push(timerId);
  });
}

async function init() {
  if (window.ghBackup) await window.ghBackup.autoRestore();
  var layout = await window.api.get('screenLayout');
  if (!layout || !layout.length) layout = window.ScreenDefs.DEFAULT_LAYOUT;
  renderWall(layout);
}

window.api.on('screenLayout:updated', function(layout) {
  if (!layout || !layout.length) layout = window.ScreenDefs.DEFAULT_LAYOUT;
  renderWall(layout);
});

(function autoScale() {
  var W = 5760, H = 2160;
  var wallEl = document.getElementById('wall');
  function fit() {
    // 寬高分開撐滿實際可視區域，不留白（可能有極輕微的比例變形，換取完全貼滿螢幕）
    var sx = window.innerWidth / W;
    var sy = window.innerHeight / H;
    wallEl.style.transform = 'scale(' + sx + ',' + sy + ')';
  }
  fit();
  window.addEventListener('resize', fit);
  // kiosk 視窗開啟後，OS 需要一點時間才會把 --window-position/--window-size
  // 真正套用到最終跨螢幕位置，太早讀到的 window.innerWidth/innerHeight 可能不準，
  // 補幾次延遲重新校正，避免縮放比例鎖死在錯誤的暫時尺寸上。
  [300, 1000, 3000].forEach(function(delay) { setTimeout(fit, delay); });
})();

init();
</script>
</body>
</html>
