<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="1800">
<title>親家市政廣場｜大廳公佈欄</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --gold:  #f59e0b;
  --gold2: #fcd34d;
  --bg:    #020617;
  --white: #ffffff;
  --dim:   rgba(255,255,255,0.75);
}

html, body {
  width:1920px; height:1080px;
  overflow:hidden;
  background:var(--bg);
  font-family:'Microsoft JhengHei','PingFang TC','Noto Sans TC',sans-serif;
  user-select:none;
}

/* ══════════════════════════════
   全螢幕照片輪播背景
══════════════════════════════ */
#bg-container {
  position:fixed; inset:0; z-index:0;
}
.bg-slide {
  position:absolute; inset:0;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:opacity 1.8s ease;
}
.bg-slide.active { opacity:1; }

/* Ken Burns 動畫 */
.bg-slide.active .bg-img {
  animation: kenburns 18s ease-in-out forwards;
}
@keyframes kenburns {
  0%   { transform:scale(1.0) translate(0,0); }
  100% { transform:scale(1.12) translate(-2%,-1%); }
}
.bg-slide.alt.active .bg-img {
  animation: kenburns2 18s ease-in-out forwards;
}
@keyframes kenburns2 {
  0%   { transform:scale(1.0) translate(0,0); }
  100% { transform:scale(1.12) translate(2%,1%); }
}
.bg-img {
  width:100%; height:100%;
  object-fit:cover; display:block;
}

/* 暗色遮罩層 */
#overlay {
  position:fixed; inset:0; z-index:1;
  background:
    linear-gradient(to bottom,
      rgba(0,0,0,0.70) 0%,
      rgba(0,0,0,0.15) 25%,
      rgba(0,0,0,0.10) 60%,
      rgba(0,0,0,0.75) 100%
    );
}

/* ══════════════════════════════
   頂部欄  (高度 120px)
══════════════════════════════ */
#topbar {
  position:fixed; top:0; left:0; right:0; z-index:20;
  height:120px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 60px;
  background:linear-gradient(to bottom, rgba(0,0,0,0.80) 0%, transparent 100%);
}

.brand { display:flex; align-items:center; gap:22px; }
.brand-icon {
  width:72px; height:72px;
  background:linear-gradient(135deg,var(--gold),#92400e);
  border-radius:18px;
  display:flex; align-items:center; justify-content:center;
  font-size:36px;
  box-shadow:0 0 24px rgba(245,158,11,0.4);
  flex-shrink:0;
}
.brand-name {
  font-size:64px; font-weight:900;
  letter-spacing:8px; color:#fff;
  text-shadow:0 2px 20px rgba(0,0,0,0.8), 0 0 30px rgba(245,158,11,0.3);
  line-height:1;
}
.brand-sub {
  font-size:18px; letter-spacing:5px;
  color:var(--gold); margin-top:6px;
  text-shadow:0 2px 8px rgba(0,0,0,0.8);
}

.clock-area { text-align:right; }
.clock {
  font-size:80px; font-weight:900;
  font-variant-numeric:tabular-nums;
  color:var(--gold);
  text-shadow:0 0 30px rgba(245,158,11,0.5), 0 2px 12px rgba(0,0,0,0.9);
  line-height:1;
}
.date-str {
  font-size:22px; color:rgba(255,255,255,0.8);
  letter-spacing:4px; margin-top:4px;
  text-shadow:0 2px 8px rgba(0,0,0,0.8);
}

/* ══════════════════════════════
   中央公告區
══════════════════════════════ */
#ann-area {
  position:fixed; z-index:15;
  top:140px; left:80px; right:80px; bottom:160px;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
}

/* 公告卡片 */
.ann-card {
  position:absolute; inset:0;
  display:flex; gap:0;
  opacity:0; transition:opacity 1.2s ease;
  pointer-events:none;
}
.ann-card.active { opacity:1; }

/* 有圖版：左圖右文 */
.ac-img {
  width:780px; flex-shrink:0; border-radius:20px 0 0 20px; overflow:hidden;
  box-shadow:0 0 60px rgba(0,0,0,0.7);
}
.ac-img img {
  width:100%; height:100%; object-fit:cover;
  transition:transform 12s ease-in-out;
}
.ann-card.active .ac-img img { transform:scale(1.07); }

.ac-body {
  flex:1;
  background:rgba(2,6,23,0.88);
  backdrop-filter:blur(16px);
  border:1px solid rgba(245,158,11,0.25);
  border-left:none;
  border-radius:0 20px 20px 0;
  padding:60px 70px;
  display:flex; flex-direction:column; justify-content:center;
  box-shadow:0 0 60px rgba(0,0,0,0.7);
}

/* 無圖版：純文字寬卡 */
.ac-body-full {
  width:1400px;
  background:rgba(2,6,23,0.88);
  backdrop-filter:blur(16px);
  border:1px solid rgba(245,158,11,0.25);
  border-radius:20px;
  padding:70px 100px;
  display:flex; flex-direction:column; justify-content:center;
  box-shadow:0 0 60px rgba(0,0,0,0.7);
}

.ac-tag {
  display:inline-flex; align-items:center; gap:10px;
  background:rgba(245,158,11,0.12);
  border:1px solid rgba(245,158,11,0.35);
  border-radius:6px; padding:6px 20px;
  font-size:18px; letter-spacing:5px; color:var(--gold);
  margin-bottom:28px; width:fit-content;
}
.ac-title {
  font-size:64px; font-weight:900; color:#fff;
  letter-spacing:4px; line-height:1.25;
  margin-bottom:30px;
  text-shadow:0 2px 10px rgba(0,0,0,0.5);
}
.ac-content {
  font-size:34px; color:rgba(255,255,255,0.85);
  letter-spacing:2px; line-height:1.9;
  overflow:hidden;
}
.ac-dots {
  display:flex; gap:12px; margin-top:40px;
}
.ac-dot {
  width:10px; height:10px; border-radius:50%;
  background:rgba(255,255,255,0.2); transition:all .4s;
}
.ac-dot.active { width:32px; border-radius:5px; background:var(--gold); }

/* ══════════════════════════════
   建案大字（無公告時）
══════════════════════════════ */
#identity-area {
  position:fixed; z-index:14;
  bottom:180px; left:0; right:0;
  text-align:center;
  pointer-events:none;
}
.id-main {
  font-size:100px; font-weight:900;
  letter-spacing:16px; color:#fff;
  text-shadow:0 4px 30px rgba(0,0,0,0.8), 0 0 60px rgba(245,158,11,0.3);
  line-height:1.1;
  opacity:0; transition:opacity 1s ease;
}
.id-sub {
  font-size:32px; letter-spacing:10px;
  color:var(--gold);
  text-shadow:0 2px 12px rgba(0,0,0,0.8);
  margin-top:14px;
  opacity:0; transition:opacity 1s ease 0.3s;
}
#identity-area.show .id-main,
#identity-area.show .id-sub { opacity:1; }


/* ══════════════════════════════
   進度條
══════════════════════════════ */
#pbar-wrap {
  position:fixed; bottom:20px; left:0; right:0; z-index:21;
  height:4px; background:rgba(255,255,255,0.08);
}
#pbar {
  height:100%;
  background:linear-gradient(90deg,var(--gold),var(--gold2));
  width:0%;
  box-shadow:0 0 8px var(--gold);
}

/* 圖片點指示 */
#slide-dots {
  position:fixed; bottom:36px; left:50%; transform:translateX(-50%);
  display:flex; gap:10px; z-index:21;
}
.sdot {
  width:8px; height:8px; border-radius:50%;
  background:rgba(255,255,255,0.25); transition:all .4s;
}
.sdot.active { width:28px; border-radius:4px; background:var(--gold); }
</style>
</head>
<body>

<!-- 背景照片輪播 -->
<div id="bg-container"></div>
<div id="overlay"></div>

<!-- 頂部欄 -->
<div id="topbar">
  <div class="brand">
    <div class="brand-icon">🏢</div>
    <div>
      <div class="brand-name" id="communityName">親家市政廣場</div>
      <div class="brand-sub">亞太新核心・七期智慧商辦</div>
    </div>
  </div>
  <div class="clock-area">
    <div class="clock" id="clock">00:00:00</div>
    <div class="date-str" id="dateStr"></div>
  </div>
</div>

<!-- 公告區 -->
<div id="ann-area"></div>

<!-- 無公告時：建案大字 -->
<div id="identity-area">
  <div class="id-main" id="communityName2">親家市政廣場</div>
  <div class="id-sub">台中市西屯區・亞太新核心・七期智慧商辦</div>
</div>

<!-- 進度條 & 圖片點 -->
<div id="pbar-wrap"><div id="pbar"></div></div>
<div id="slide-dots"></div>


<script src="../../shared/api.js"></script>
<script>
/* ────────────────────────────────────────────────────
   建案高清照片（chingjia.com 原圖）
──────────────────────────────────────────────────── */
const BASE = 'https://www.chingjia.com/';
const BUILDING_PHOTOS = [
  'upload/project_more_b/98469d8d5c82e63758e8e382bbfa2db9-20220517160647.jpg',
  'upload/project_more_b/0f24079666b9e5e934987cf77caa81de-20220517160648.jpg',
  'upload/project_more_b/f576654784e58dc57f11b80a11325d5f-20220517160649.jpg',
  'upload/project_more_b/68bc4b6c27c737be9abfb42107b7961a-20220517160650.jpg',
  'upload/project_more_b/4a20d0d4c5fbf105b10a3c7ffe1b0db7-20220517160651.jpg',
  'upload/project_more_b/e4960667c83efa20f87111083571a0fe-20220517160652.jpg',
  'upload/project_more_b/9e523dfebe23b2b8341ecd313cf16361-20220517160653.jpg',
  'upload/project_more_b/fd82dbb26c7028e0bd6402bc1d4fd257-20220517160654.jpg',
  'upload/project_more_b/d4d1d529ea10e398af6d8d13ecae3ba4-20220517160654.jpg',
  'upload/project_more_b/7616900d73568fe05f4ee8dd0931b552-20220517160655.jpg',
  'upload/project_more_b/263c70f4c291fbcf394e857e2ef9ff94-20220517160656.jpg',
  'upload/project_more_b/827d34444a1f0014ff0dce2960ffa385-20220517160657.jpg',
].map(p => BASE + p);

const DAYS = ['日','一','二','三','四','五','六'];

/* ────────────────────────────────────────────────────
   時鐘
──────────────────────────────────────────────────── */
function tick(){
  const n=new Date();
  document.getElementById('clock').textContent=
    [n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');
  document.getElementById('dateStr').textContent=
    `${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日　星期${DAYS[n.getDay()]}`;
}
clockTimer = setInterval(tick,1000); tick();

/* ────────────────────────────────────────────────────
   背景照片輪播
──────────────────────────────────────────────────── */
let bgIdx=0, bgTimer=null, bgSlides=[], bgInterval=12000;
const bgContainer = document.getElementById('bg-container');
const dotsEl = document.getElementById('slide-dots');

function buildBgSlides(photos){
  bgSlides = photos;
  bgContainer.innerHTML = photos.map((src,i)=>`
    <div class="bg-slide${i===0?' active':''}${i%2?' alt':''}" id="bg${i}">
      <img class="bg-img" src="${src}" alt="" loading="${i<3?'eager':'lazy'}" draggable="false">
    </div>`).join('');
  dotsEl.innerHTML = photos.map((_,i)=>`<div class="sdot${i===0?' active':''}"></div>`).join('');
  bgIdx=0;
  startBgTimer();
}

function goBg(idx){
  document.getElementById('bg'+bgIdx)?.classList.remove('active');
  dotsEl.children[bgIdx]?.classList.remove('active');
  bgIdx=((idx%bgSlides.length)+bgSlides.length)%bgSlides.length;
  document.getElementById('bg'+bgIdx)?.classList.add('active');
  dotsEl.children[bgIdx]?.classList.add('active');
}

function startBgTimer(){
  if(bgTimer)clearInterval(bgTimer);
  bgTimer=setInterval(()=>goBg(bgIdx+1), bgInterval);
}

/* ────────────────────────────────────────────────────
   進度條
──────────────────────────────────────────────────── */
let pbarDur=12000;
function resetPbar(dur){
  pbarDur=dur||pbarDur;
  const b=document.getElementById('pbar');
  b.style.transition='none'; b.style.width='0%';
  requestAnimationFrame(()=>{
    b.style.transition=`width ${pbarDur}ms linear`;
    b.style.width='100%';
  });
}

/* ────────────────────────────────────────────────────
   公告輪播
──────────────────────────────────────────────────── */
let annList=[], annIdx=0, annTimer=null, annInterval=12000;
let hasAnn=false;
let _rawAnnList=[];   // 完整清單（含未到期、已結束），用於排程重新檢查

/* ── 排程過濾 ── */
function isAnnActive(a){
  if(a.alwaysValid!==false) return true;
  const now=Date.now();
  const start=a.startDate?new Date(a.startDate+'T'+(a.startTime||'00:00')).getTime():0;
  const end  =a.endDate  ?new Date(a.endDate  +'T'+(a.endTime  ||'23:59:59')).getTime():Infinity;
  return now>=start && now<=end;
}
function filterActive(list){ return (list||[]).filter(isAnnActive); }

function renderAnnouncements(list){
  hasAnn = list && list.length > 0;
  document.getElementById('ann-area').innerHTML='';
  document.getElementById('identity-area').classList.toggle('show',!hasAnn);

  if(!hasAnn){ resetPbar(bgInterval); return; }

  annList=list; annIdx=0;
  document.getElementById('ann-area').innerHTML = list.map((ann,i)=>{
    const img=ann.imageUrl||ann.image||'';
    const title=escHtml(ann.title||'');
    const body=escHtml(ann.content||'').replace(/\n/g,'<br>');
    const dots=list.map((_,j)=>`<div class="ac-dot${j===0?' active':''}" id="acd_${i}_${j}"></div>`).join('');
    if(img){
      return `<div class="ann-card${i===0?' active':''}" id="ac${i}">
        <div class="ac-img"><img src="${escAttr(img)}" alt="" loading="lazy"></div>
        <div class="ac-body">
          <div class="ac-tag">◆ 社區公告</div>
          <div class="ac-title">${title}</div>
          <div class="ac-content">${body}</div>
          <div class="ac-dots">${dots}</div>
        </div>
      </div>`;
    } else {
      return `<div class="ann-card${i===0?' active':''}" id="ac${i}">
        <div class="ac-body-full">
          <div class="ac-tag">◆ 社區公告</div>
          <div class="ac-title">${title}</div>
          <div class="ac-content">${body}</div>
          <div class="ac-dots">${dots}</div>
        </div>
      </div>`;
    }
  }).join('');

  annIdx=0;
  resetPbar(annInterval);
  if(annTimer)clearInterval(annTimer);
  annTimer=setInterval(nextAnn, annInterval);
}

function nextAnn(){
  document.getElementById('ac'+annIdx)?.classList.remove('active');
  const prevIdx=annIdx;
  annIdx=(annIdx+1)%annList.length;
  document.getElementById('ac'+annIdx)?.classList.add('active');
  // 更新指示點
  annList.forEach((_,i)=>{
    annList.forEach((_2,j)=>{
      const d=document.getElementById(`acd_${i}_${j}`);
      if(d)d.classList.toggle('active',j===annIdx);
    });
  });
  resetPbar(annInterval);
}

/* ────────────────────────────────────────────────────
   快訊
──────────────────────────────────────────────────── */
let newsIdx=0, newsTimer=null, clockTimer=null, schedTimer=null;
function renderNews(list){
  const wrap=document.getElementById('newsWrap');
  if(!list||!list.length){
    wrap.innerHTML='<div class="news-item active">歡迎蒞臨親家市政廣場，祝您工作愉快！</div>';
    return;
  }
  wrap.innerHTML=list.map((n,i)=>`<div class="news-item${i===0?' active':''}" id="ni${i}">${escHtml(n.title||n)}</div>`).join('');
  if(newsTimer)clearInterval(newsTimer);
  newsIdx=0;
  newsTimer=setInterval(()=>{
    const p=document.getElementById('ni'+newsIdx);
    if(p){p.classList.remove('active');p.classList.add('exit');}
    newsIdx=(newsIdx+1)%list.length;
    setTimeout(()=>{
      if(p)p.classList.remove('exit');
      document.getElementById('ni'+newsIdx)?.classList.add('active');
    },620);
  },7000);
}

/* ────────────────────────────────────────────────────
   跑馬燈
──────────────────────────────────────────────────── */
function setMarquee(text){
  const t=text||'歡迎光臨親家市政廣場';
  document.getElementById('mseg1').textContent=t;
  document.getElementById('mseg2').textContent=t;
  const dur=Math.max(20,t.length*0.5);
  document.getElementById('mtrack').style.animationDuration=dur+'s';
}

/* ────────────────────────────────────────────────────
   工具
──────────────────────────────────────────────────── */
function escHtml(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]);}
function escAttr(s){return String(s||'').replace(/"/g,'&quot;');}

/* ────────────────────────────────────────────────────
   初始化
──────────────────────────────────────────────────── */
async function init(){
  if(window.ghBackup) await window.ghBackup.autoRestore();
  const [ann,sett,news]=await Promise.all([
    window.api.get('announcements'),
    window.api.get('settings'),
    window.api.get('news')
  ]);

  if(sett.communityName){
    document.getElementById('communityName').textContent=sett.communityName;
    document.getElementById('communityName2').textContent=sett.communityName;
  }

  annInterval=(sett.slideInterval||12)*1000;
  bgInterval=annInterval;

  // 合併：建案照片 + 管理後台上傳的圖片
  const extra=(sett.imageUrls||[]).filter(Boolean);
  const allPhotos=[...BUILDING_PHOTOS,...extra];
  buildBgSlides(allPhotos);

  setMarquee(ann.marquee);
  renderNews(news);
  _rawAnnList = ann.list||[];
  renderAnnouncements(filterActive(_rawAnnList));

  // 每分鐘重新過濾（自動上下架）
  schedTimer = setInterval(()=> renderAnnouncements(filterActive(_rawAnnList)), 60000);
}

window.addEventListener('beforeunload', () => {
  if (clockTimer)  clearInterval(clockTimer);
  if (bgTimer)     clearInterval(bgTimer);
  if (annTimer)    clearInterval(annTimer);
  if (newsTimer)   clearInterval(newsTimer);
  if (schedTimer)  clearInterval(schedTimer);
});

/* ────────────────────────────────────────────────────
   即時更新
──────────────────────────────────────────────────── */
window.api.on('announcements:updated',ann=>{
  setMarquee(ann.marquee);
  _rawAnnList = ann.list||[];
  renderAnnouncements(filterActive(_rawAnnList));
});
window.api.on('settings:updated',s=>{
  if(s.communityName){
    document.getElementById('communityName').textContent=s.communityName;
    document.getElementById('communityName2').textContent=s.communityName;
  }
  if(s.slideInterval){
    annInterval=s.slideInterval*1000;
    bgInterval=annInterval;
    startBgTimer();
  }
  if(s.imageUrls){
    const extra=(s.imageUrls||[]).filter(Boolean);
    buildBgSlides([...BUILDING_PHOTOS,...extra]);
  }
});
window.api.on('news:updated',n=>renderNews(n));

init();
</script>
</body>
</html>
