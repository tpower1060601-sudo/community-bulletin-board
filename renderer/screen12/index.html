<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>股市熱力圖</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --accent:#f59e0b; --bg:#0a0e1a; }
body {
  background: var(--bg);
  color: #fff;
  font-family: 'Microsoft JhengHei','PingFang TC',sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  user-select: none;
}

/* Header */
.header {
  flex-shrink: 0;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 36px;
  background: rgba(0,0,0,0.5);
  border-bottom: 2px solid var(--accent);
}
.header-left { display:flex; align-items:center; gap:20px; }
.header-icon { font-size:30px; line-height:1; }
.header-title {
  font-size: 26px; font-weight: 900; letter-spacing: 3px;
  color: var(--accent);
  text-shadow: 0 0 16px rgba(245,158,11,0.5);
}
.header-subtitle { font-size:13px; color:rgba(255,255,255,0.4); letter-spacing:2px; margin-top:2px; }

/* Market tabs */
.market-tabs { display:flex; gap:8px; }
.market-tab {
  padding: 6px 20px;
  border-radius: 20px;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.5);
  transition: all 0.2s;
}
.market-tab.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
  box-shadow: 0 0 12px rgba(245,158,11,0.4);
}
.market-tab:hover:not(.active) { border-color:rgba(245,158,11,0.4); color:var(--accent); }

.header-right { display:flex; align-items:center; gap:20px; }
.clock {
  font-size: 26px; font-weight: 900;
  font-variant-numeric: tabular-nums;
  color: var(--accent);
  text-shadow: 0 0 14px rgba(245,158,11,0.4);
  letter-spacing: 2px;
}
.market-status {
  font-size:12px; padding:4px 12px; border-radius:20px; font-weight:700; letter-spacing:1px;
}
.market-status.open  { background:rgba(34,197,94,0.15); color:#22c55e; border:1px solid rgba(34,197,94,0.3); }
.market-status.closed{ background:rgba(148,163,184,0.1); color:rgba(148,163,184,0.6); border:1px solid rgba(148,163,184,0.2); }

/* Widget panels — all stacked, visibility toggled */
.widget-wrap { flex:1; position:relative; overflow:hidden; }

.widget-panel {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  visibility: hidden;
  pointer-events: none;
}
.widget-panel.active {
  visibility: visible;
  pointer-events: auto;
}
.tradingview-widget-container,
.tradingview-widget-container__widget {
  width: 100% !important;
  height: 100% !important;
}
.tradingview-widget-container {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">📊</div>
    <div>
      <div class="header-title">股市熱力圖</div>
      <div class="header-subtitle">STOCK MARKET HEATMAP</div>
    </div>
    <div class="market-tabs">
      <div class="market-tab active" data-panel="tw"  onclick="switchMarket(this)">台股</div>
      <div class="market-tab"        data-panel="hk"  onclick="switchMarket(this)">港股</div>
      <div class="market-tab"        data-panel="us"  onclick="switchMarket(this)">美股</div>
    </div>
  </div>
  <div class="header-right">
    <div class="market-status open" id="mStatus">盤中</div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</div>

<div class="widget-wrap">

  <!-- ── 台股 ── -->
  <div class="widget-panel active" id="panel-tw">
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>
      <script type="text/javascript"
        src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
      {
        "exchanges": ["TWSE","TPEX"],
        "dataSource": "TWSE",
        "grouping": "sector",
        "blockColor": "change",
        "locale": "zh_TW",
        "colorTheme": "dark",
        "hasTopBar": false,
        "isDataSetEnabled": false,
        "isZoomEnabled": true,
        "hasSymbolTooltip": true,
        "isMonoSize": false,
        "width": "100%",
        "height": "100%"
      }
      </script>
    </div>
  </div>

  <!-- ── 港股 ── -->
  <div class="widget-panel" id="panel-hk">
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>
      <script type="text/javascript"
        src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
      {
        "exchanges": ["HKEX"],
        "dataSource": "HKEX",
        "grouping": "sector",
        "blockColor": "change",
        "locale": "zh_TW",
        "colorTheme": "dark",
        "hasTopBar": false,
        "isDataSetEnabled": false,
        "isZoomEnabled": true,
        "hasSymbolTooltip": true,
        "isMonoSize": false,
        "width": "100%",
        "height": "100%"
      }
      </script>
    </div>
  </div>

  <!-- ── 美股 ── -->
  <div class="widget-panel" id="panel-us">
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>
      <script type="text/javascript"
        src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
      {
        "exchanges": ["NYSE","NASDAQ","NYSE ARCA"],
        "dataSource": "SPX500",
        "grouping": "sector",
        "blockColor": "change",
        "locale": "zh_TW",
        "colorTheme": "dark",
        "hasTopBar": false,
        "isDataSetEnabled": false,
        "isZoomEnabled": true,
        "hasSymbolTooltip": true,
        "isMonoSize": false,
        "width": "100%",
        "height": "100%"
      }
      </script>
    </div>
  </div>

</div>

<script src="../../shared/api.js"></script>
<script>
/* ── 時鐘 ── */
function tick() {
  var n = new Date();
  var h = n.getHours(), m = n.getMinutes(), s = n.getSeconds();
  document.getElementById('clock').textContent =
    [h,m,s].map(function(v){ return String(v).padStart(2,'0'); }).join(':');
  // 台股 09:00–13:30 平日
  var day = n.getDay(), mins = h * 60 + m;
  var isOpen = day >= 1 && day <= 5 && mins >= 540 && mins < 810;
  var el = document.getElementById('mStatus');
  el.textContent = isOpen ? '盤中' : '收盤';
  el.className = 'market-status ' + (isOpen ? 'open' : 'closed');
}
setInterval(tick, 1000); tick();

/* ── 切換市場 ── */
function switchMarket(el) {
  document.querySelectorAll('.market-tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  var panelId = 'panel-' + el.getAttribute('data-panel');
  document.querySelectorAll('.widget-panel').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById(panelId).classList.add('active');
}
</script>
</body>
</html>
