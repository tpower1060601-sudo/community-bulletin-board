<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>YouTube 頻道 2</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; height:100vh; overflow:hidden; }
.wrap { width:100%; height:100%; position:relative; }
.wrap iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; }
.placeholder {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100vh; background:#04080f; color:rgba(255,255,255,0.2);
  font-family:'Microsoft JhengHei',sans-serif; gap:16px;
}
.placeholder .icon { font-size:80px; }
.placeholder .msg  { font-size:22px; letter-spacing:2px; }
.placeholder .sub  { font-size:14px; opacity:0.5; }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="placeholder">
    <div class="icon">📺</div>
    <div class="msg">載入中…</div>
  </div>
</div>

<script src="../../shared/api.js"></script>
<script>
'use strict';
function render(id) {
  const wrap = document.getElementById('wrap');
  if (!id) {
    wrap.innerHTML = '<div class="placeholder"><div class="icon">📺</div><div class="msg">YouTube 頻道 2</div><div class="sub">請至管理後台設定 YouTube ID</div></div>';
  } else {
    wrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&rel=0&showinfo=0&controls=0" allow="autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
  }
}
async function init() {
  const s = await window.api.get('settings');
  render(s.youtubeId2 || '');
}
window.api.on('settings:updated', s => render(s.youtubeId2 || ''));
init();
</script>
</body>
</html>
