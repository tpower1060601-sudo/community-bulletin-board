<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="1800">
<title>YouTube 頻道 1</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; height:100vh; overflow:hidden; }
#yt-player { position:absolute; top:0; left:0; width:100%; height:100%; border:none; }
.placeholder {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100vh; background:#04080f; color:rgba(255,255,255,0.2);
  font-family:'Microsoft JhengHei',sans-serif; gap:16px;
}
.placeholder .icon { font-size:80px; }
.placeholder .msg  { font-size:22px; letter-spacing:2px; }
.placeholder .sub  { font-size:14px; opacity:0.5; }
</style>
</head>
<body>
<div id="wrap" style="width:100%;height:100%;position:relative;">
  <div class="placeholder">
    <div class="icon">📺</div>
    <div class="msg">載入中…</div>
  </div>
</div>

<script src="../../shared/api.js"></script>
<script>
'use strict';
var player = null;
var currentId = '';

function onYouTubeIframeAPIReady() {
  if (currentId) loadPlayer(currentId);
}

function loadPlayer(id) {
  var wrap = document.getElementById('wrap');
  wrap.innerHTML = '<div id="yt-player"></div>';
  player = new YT.Player('yt-player', {
    videoId: id,
    width: '100%',
    height: '100%',
    playerVars: {
      autoplay: 1,
      mute: 1,
      rel: 0,
      showinfo: 0,
      controls: 0
    },
    events: {
      onReady: function(e) {
        e.target.playVideo();
      }
    }
  });
}

function render(id) {
  currentId = id || '';
  var wrap = document.getElementById('wrap');
  if (!id) {
    if (player) { player.destroy(); player = null; }
    wrap.innerHTML = '<div class="placeholder"><div class="icon">📺</div><div class="msg">YouTube 頻道 1</div><div class="sub">請至管理後台設定 YouTube ID</div></div>';
    return;
  }
  if (window.YT && YT.Player) {
    loadPlayer(id);
  }
  // 若 API 尚未載入，等 onYouTubeIframeAPIReady 觸發
}

async function init() {
  if (window.ghBackup) await window.ghBackup.autoRestore();
  var s = await window.api.get('settings');
  currentId = s.youtubeId || '';
  // 載入 YouTube IFrame API
  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
  // 若 API 已載入過（重新整理後快取）
  if (window.YT && YT.Player && currentId) loadPlayer(currentId);
}

window.api.on('settings:updated', function(s) { render(s.youtubeId || ''); });
init();
</script>
</body>
</html>
