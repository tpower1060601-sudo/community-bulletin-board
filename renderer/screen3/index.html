<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>全球市場儀表板</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #020b14; color: #fff;
  font-family: 'Inter','Microsoft JhengHei','PingFang TC',sans-serif;
  height: 100vh; overflow: hidden; user-select: none;
}

.layout { height:100vh; display:flex; flex-direction:column; }

/* ── 世界時鐘列 ── */
.clock-bar {
  flex-shrink:0; display:flex;
  background:rgba(0,0,0,.55); border-bottom:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(20px);
}
.wc {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:10px 6px; border-right:1px solid rgba(255,255,255,.06); position:relative;
}
.wc:last-child { border-right:none; }
.wc-city { font-size:12px; font-weight:800; letter-spacing:2px; color:rgba(255,255,255,.4); text-transform:uppercase; }
.wc-time { font-size:36px; font-weight:900; letter-spacing:1px; font-variant-numeric:tabular-nums; line-height:1.1; }
.wc-date { font-size:11px; color:rgba(255,255,255,.32); margin-top:2px; }
.wc-open {
  position:absolute; top:8px; right:8px;
  width:7px; height:7px; border-radius:50%;
  background:#22c55e; box-shadow:0 0 8px #22c55e;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(1.5)} }

/* ── 4欄市場區 ── */
.market-grid {
  flex:1; min-height:0;
  display:grid;
  grid-template-columns: repeat(4, 1fr);
}
.market-col {
  border-right:1px solid rgba(255,255,255,.07);
  display:flex; flex-direction:column; overflow:hidden;
}
.market-col:last-child { border-right:none; }

.col-header {
  flex-shrink:0;
  padding:9px 16px 7px;
  background:rgba(0,0,0,.35);
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex; align-items:center; gap:8px;
}
.col-icon  { font-size:15px; }
.col-title { font-size:11px; font-weight:800; letter-spacing:3px; color:rgba(255,255,255,.38); text-transform:uppercase; }

.col-widget { flex:1; min-height:0; position:relative; }
.col-widget .tradingview-widget-container,
.col-widget .tradingview-widget-container__widget { height:100% !important; width:100% !important; }
</style>
</head>
<body>
<div class="layout">

  <!-- ── 世界時鐘 ── -->
  <div class="clock-bar" id="clockBar"></div>

  <!-- ── 4欄市場 ── -->
  <div class="market-grid">

    <!-- 欄 1：亞太股市 -->
    <div class="market-col">
      <div class="col-header">
        <span class="col-icon">🌏</span>
        <span class="col-title">亞太股市</span>
      </div>
      <div class="col-widget">
        <div class="tradingview-widget-container" style="height:100%">
          <div class="tradingview-widget-container__widget" style="height:100%"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
          {
            "colorTheme":        "dark",
            "dateRange":         "1D",
            "showChart":         false,
            "locale":            "zh_TW",
            "isTransparent":     true,
            "showSymbolLogo":    true,
            "showFloatingTooltip": false,
            "width":  "100%",
            "height": "100%",
            "tabs": [{
              "title": "亞太",
              "symbols": [
                {"s": "INDEX:TWII",        "d": "台灣加權指數"},
                {"s": "INDEX:NKY",         "d": "日經 225"},
                {"s": "INDEX:HSI",         "d": "恆生指數"},
                {"s": "SSE:000001",        "d": "上證綜指"},
                {"s": "FOREXCOM:KS11USD",  "d": "KOSPI"},
                {"s": "INDEX:STI",         "d": "新加坡 STI"},
                {"s": "ASX:XJO",           "d": "澳洲 ASX 200"}
              ]
            }]
          }
          </script>
        </div>
      </div>
    </div>

    <!-- 欄 2：歐美股市 -->
    <div class="market-col">
      <div class="col-header">
        <span class="col-icon">🌍</span>
        <span class="col-title">歐美股市</span>
      </div>
      <div class="col-widget">
        <div class="tradingview-widget-container" style="height:100%">
          <div class="tradingview-widget-container__widget" style="height:100%"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
          {
            "colorTheme":        "dark",
            "dateRange":         "1D",
            "showChart":         false,
            "locale":            "zh_TW",
            "isTransparent":     true,
            "showSymbolLogo":    true,
            "showFloatingTooltip": false,
            "width":  "100%",
            "height": "100%",
            "tabs": [{
              "title": "歐美",
              "symbols": [
                {"s": "FOREXCOM:SPXUSD",  "d": "S&P 500"},
                {"s": "FOREXCOM:NSXUSD",  "d": "NASDAQ 100"},
                {"s": "FOREXCOM:DJIA",    "d": "道瓊工業"},
                {"s": "INDEX:DAX",        "d": "德國 DAX"},
                {"s": "FOREXCOM:UKXGBP",  "d": "英國 FTSE 100"},
                {"s": "INDEX:CAC40",      "d": "法國 CAC 40"},
                {"s": "INDEX:SX5E",       "d": "歐元 STOXX 50"}
              ]
            }]

      </div>
    </div>

    <!-- 欄 3：台股精選 -->
    <div class="market-col">
      <div class="col-header">
        <span class="col-icon">🇹🇼</span>
        <span class="col-title">台股精選</span>
      </div>
      <div class="col-widget">
        <div class="tradingview-widget-container" style="height:100%">
          <div class="tradingview-widget-container__widget" style="height:100%"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
          {
            "colorTheme":        "dark",
            "dateRange":         "1D",
            "showChart":         false,
            "locale":            "zh_TW",
            "isTransparent":     true,
            "showSymbolLogo":    true,
            "showFloatingTooltip": false,
            "width":  "100%",
            "height": "100%",
            "tabs": [{

              "symbols": [

                {"s": "TSE:2308", "d": "台達電"},
                {"s": "TSE:2881", "d": "富邦金"},
                {"s": "TSE:2412", "d": "中華電"},
                {"s": "TSE:2002", "d": "中鋼"}

      </div>
    </div>

    <!-- 欄 4：外匯 / 商品 -->
    <div class="market-col">
      <div class="col-header">
        <span class="col-icon">💱</span>
        <span class="col-title">外匯．商品</span>
      </div>
      <div class="col-widget">
        <div class="tradingview-widget-container" style="height:100%">
          <div class="tradingview-widget-container__widget" style="height:100%"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
          {
            "colorTheme":        "dark",
            "dateRange":         "1D",
            "showChart":         false,
            "locale":            "zh_TW",
            "isTransparent":     true,
            "showSymbolLogo":    true,
            "showFloatingTooltip": false,
            "width":  "100%",
            "height": "100%",
            "tabs": [{
              "title": "外匯商品",
              "symbols": [
                {"s": "FX_IDC:USDTWD", "d": "美元 / 台幣"},
                {"s": "FX:EURUSD",     "d": "歐元 / 美元"},
                {"s": "FX:USDJPY",     "d": "美元 / 日圓"},
                {"s": "TVC:GOLD",      "d": "黃金"},
                {"s": "TVC:USOIL",     "d": "WTI 原油"},
                {"s": "BINANCE:BTCUSDT", "d": "比特幣 BTC"},
                {"s": "BINANCE:ETHUSDT", "d": "以太幣 ETH"}
              ]
            }]
          }
          </script>
        </div>
      </div>
    </div>

  </div><!-- /market-grid -->
</div><!-- /layout -->

<script src="../../shared/api.js"></script>
<script>
'use strict';

const CITIES = [
  { city:'台北',     tz:'Asia/Taipei',       mkt:'TWSE' },
  { city:'東京',     tz:'Asia/Tokyo',         mkt:'TSE'  },
  { city:'香港',     tz:'Asia/Hong_Kong',     mkt:'HKEX' },
  { city:'上海',     tz:'Asia/Shanghai',      mkt:'SSE'  },
  { city:'倫敦',     tz:'Europe/London',      mkt:'LSE'  },
  { city:'法蘭克福', tz:'Europe/Berlin',      mkt:'FSE'  },
  { city:'紐約',     tz:'America/New_York',   mkt:'NYSE' },
];

const MARKETS = [
  { id:'TWSE', tz:'Asia/Taipei',      oh:9,  om:0,  ch:13, cm:30 },
  { id:'TSE',  tz:'Asia/Tokyo',       oh:9,  om:0,  ch:15, cm:30 },
  { id:'HKEX', tz:'Asia/Hong_Kong',   oh:9,  om:30, ch:16, cm:0  },
  { id:'SSE',  tz:'Asia/Shanghai',    oh:9,  om:30, ch:15, cm:0  },
  { id:'KSE',  tz:'Asia/Seoul',       oh:9,  om:0,  ch:15, cm:30 },
  { id:'LSE',  tz:'Europe/London',    oh:8,  om:0,  ch:16, cm:30 },
  { id:'FSE',  tz:'Europe/Berlin',    oh:9,  om:0,  ch:17, cm:30 },
  { id:'NYSE', tz:'America/New_York', oh:9,  om:30, ch:16, cm:0  },
];

function isMarketOpen(mkt) {
  const m = MARKETS.find(x => x.id === mkt);
  if (!m) return false;
  const now = new Date();
  const loc = new Date(now.toLocaleString('en-US', { timeZone: m.tz }));
  const dow = loc.getDay();
  if (dow === 0 || dow === 6) return false;
  const min = loc.getHours() * 60 + loc.getMinutes();
  return min >= m.oh * 60 + m.om && min < m.ch * 60 + m.cm;
}

function tickClocks() {
  const bar = document.getElementById('clockBar');
  if (!bar) return;
  const now = new Date();
  bar.innerHTML = CITIES.map(c => {
    const t = now.toLocaleTimeString('zh-TW', { timeZone:c.tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
    const d = now.toLocaleDateString('zh-TW', { timeZone:c.tz, month:'2-digit', day:'2-digit', weekday:'short' });
    const open = isMarketOpen(c.mkt);
    return `<div class="wc">
      ${open ? '<div class="wc-open"></div>' : ''}
      <div class="wc-city">${c.city}</div>
      <div class="wc-time">${t}</div>
      <div class="wc-date">${d}</div>
    </div>`;
  }).join('');
}

tickClocks();
setInterval(tickClocks, 1000);

async function init() {
  if (window.ghBackup) await window.ghBackup.autoRestore();
}
init();
</script>
</body>
</html>
