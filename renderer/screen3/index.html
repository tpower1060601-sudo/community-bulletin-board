<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>全球市場儀表板</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #020b14; color: #fff;
  font-family: 'Inter','Microsoft JhengHei','PingFang TC',sans-serif;
  height: 100vh; overflow: hidden; user-select: none;
}

#bg { position:fixed; inset:0; z-index:0; transition:background 90s ease; }
#bg-overlay { position:fixed; inset:0; z-index:1; background:linear-gradient(to bottom,rgba(0,0,0,.35) 0%,rgba(0,0,0,.5) 100%); pointer-events:none; }

.layout { position:relative; z-index:10; height:100vh; display:flex; flex-direction:column; }

/* ── 世界時鐘列 ── */
.clock-bar {
  flex-shrink:0; display:flex;
  background:rgba(0,0,0,.45); border-bottom:1px solid rgba(255,255,255,.07);
  backdrop-filter:blur(20px);
}
.wc {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:10px 6px; border-right:1px solid rgba(255,255,255,.06); position:relative;
}
.wc:last-child { border-right:none; }
.wc-city { font-size:12px; font-weight:800; letter-spacing:2px; color:rgba(255,255,255,.4); text-transform:uppercase; }
.wc-time { font-size:36px; font-weight:900; letter-spacing:1px; font-variant-numeric:tabular-nums; line-height:1.1; }
.wc-date { font-size:11px; color:rgba(255,255,255,.32); margin-top:2px; }
.wc-open {
  position:absolute; top:8px; right:8px;
  width:7px; height:7px; border-radius:50%;
  background:#22c55e; box-shadow:0 0 8px #22c55e;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(1.5)} }

/* ── 市場時段 ── */
.session-bar {
  flex-shrink:0; display:flex; align-items:center; gap:12px;
  padding:6px 28px; background:rgba(0,0,0,.3); border-bottom:1px solid rgba(255,255,255,.04);
}
.session-lbl { font-size:10px; font-weight:800; letter-spacing:2px; color:rgba(255,255,255,.25); flex-shrink:0; }
.session-track { flex:1; height:18px; position:relative; background:rgba(255,255,255,.04); border-radius:4px; overflow:visible; }
.seg {
  position:absolute; top:0; bottom:0; border-radius:3px;
  display:flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:800; letter-spacing:1px; overflow:hidden; white-space:nowrap;
  opacity:.75;
}
.seg.active { opacity:1; box-shadow:0 0 6px currentColor; }
.now-line {
  position:absolute; top:-3px; bottom:-3px; width:2px;
  background:#fff; border-radius:2px; box-shadow:0 0 8px rgba(255,255,255,.8);
  z-index:5;
}

/* ── 主三欄 ── */
.main { flex:1; min-height:0; display:grid; grid-template-columns:260px 1fr 300px; }
.panel {
  border-right:1px solid rgba(255,255,255,.06); overflow:hidden;
  display:flex; flex-direction:column; padding:14px 16px; transition:background 2s ease;
}
.panel:last-child { border-right:none; }
.panel-title { font-size:13px; font-weight:800; letter-spacing:3px; color:rgba(255,255,255,.35); text-transform:uppercase; margin-bottom:12px; flex-shrink:0; }

/* 股市兩欄 */
.stock-cols { flex:1; display:flex; gap:8px; min-height:0; overflow:hidden; }
.panel-scroll { flex:1; overflow-y:auto; overflow-x:hidden; }
.panel-scroll::-webkit-scrollbar { width:3px; }
.panel-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }

/* ── 共用行 ── */
.row {
  display:flex; align-items:center; padding:11px 12px; border-radius:10px;
  margin-bottom:7px; background:rgba(255,255,255,.04); transition:background .4s, box-shadow .4s;
}
.row.open { background:rgba(255,255,255,.07); }
.lbl { font-size:14px; font-weight:700; color:rgba(255,255,255,.55); flex-shrink:0; letter-spacing:.5px; }
.val { flex:1; font-size:24px; font-weight:900; font-variant-numeric:tabular-nums; padding:0 10px; }
.chg { font-size:14px; font-weight:700; text-align:right; flex-shrink:0; }
.up { color:#4ade80; }
.dn { color:#f87171; }
.nc { color:rgba(255,255,255,.3); }

/* ── 外匯 ── */
.fx-lbl { width:70px; font-size:13px; }
.fx-val { font-size:24px; }
.fx-unit { font-size:12px; opacity:.4; margin-left:3px; font-weight:600; }
#forexList .row { padding:8px 10px; margin-bottom:5px; }

/* ── 股市 ── */
.stock-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; margin-right:8px; }
.stock-lbl { width:68px; }
.stock-name { font-size:11px; color:rgba(255,255,255,.35); letter-spacing:.5px; }
.closed-tag { font-size:11px; letter-spacing:1px; color:rgba(255,255,255,.25); margin-left:4px; flex-shrink:0; }
.stock-cols .row { padding:9px 10px; margin-bottom:6px; }
.stock-cols .val { font-size:19px; padding:0 5px; }
.stock-cols .chg { font-size:12px; }

/* ── 商品/加密 ── */
.asset-sep { font-size:10px; font-weight:800; letter-spacing:3px; color:rgba(255,255,255,.22); margin:10px 0 7px 2px; text-transform:uppercase; }
.crypto-icon { font-size:20px; width:30px; flex-shrink:0; }
.crypto-lbl { width:52px; }
#cryptoList .row { padding:9px 12px; margin-bottom:6px; }
#cryptoList .val { font-size:21px; }

.placeholder { color:rgba(255,255,255,.2); font-size:13px; letter-spacing:3px; text-align:center; padding:20px 0; }
</style>
</head>
<body>
<div id="bg"></div>
<div id="bg-overlay"></div>

<div class="layout">
  <div class="clock-bar" id="clockBar"></div>
  <div class="session-bar">
    <div class="session-lbl">市場時段 UTC</div>
    <div class="session-track" id="sessionTrack"></div>
  </div>
  <div class="main">
    <div class="panel" id="pForex">
      <div class="panel-title">💱 外匯匯率</div>
      <div class="panel-scroll" id="forexList"><div class="placeholder">連線中…</div></div>
    </div>
    <div class="panel" id="pStocks">
      <div class="panel-title">📈 全球股市指數</div>
      <div class="stock-cols">
        <div class="panel-scroll" id="stockCol0"><div class="placeholder">連線中…</div></div>
        <div class="panel-scroll" id="stockCol1"><div class="placeholder">連線中…</div></div>
      </div>
    </div>
    <div class="panel" id="pCrypto">
      <div class="panel-title">₿ 貨幣 · 商品</div>
      <div class="panel-scroll" id="cryptoList"><div class="placeholder">連線中…</div></div>
    </div>
  </div>
</div>

<script>
'use strict';

/* ══════════════════════════════════════════
   設定
══════════════════════════════════════════ */
const CITIES = [
  { city:'台北',     tz:'Asia/Taipei',       mkt:'TWSE' },
  { city:'東京',     tz:'Asia/Tokyo',         mkt:'TSE'  },
  { city:'香港',     tz:'Asia/Hong_Kong',     mkt:'HKEX' },
  { city:'上海',     tz:'Asia/Shanghai',      mkt:'SSE'  },
  { city:'倫敦',     tz:'Europe/London',      mkt:'LSE'  },
  { city:'法蘭克福', tz:'Europe/Berlin',      mkt:'FSE'  },
  { city:'紐約',     tz:'America/New_York',   mkt:'NYSE' },
];

const MARKETS = [
  { id:'TWSE', tz:'Asia/Taipei',      oh:9,  om:0,  ch:13, cm:30 },
  { id:'TSE',  tz:'Asia/Tokyo',       oh:9,  om:0,  ch:15, cm:30 },
  { id:'HKEX', tz:'Asia/Hong_Kong',   oh:9,  om:30, ch:16, cm:0  },
  { id:'SSE',  tz:'Asia/Shanghai',    oh:9,  om:30, ch:15, cm:0  },
  { id:'KSE',  tz:'Asia/Seoul',       oh:9,  om:0,  ch:15, cm:30 },
  { id:'LSE',  tz:'Europe/London',    oh:8,  om:0,  ch:16, cm:30 },
  { id:'FSE',  tz:'Europe/Berlin',    oh:9,  om:0,  ch:17, cm:30 },
  { id:'NYSE', tz:'America/New_York', oh:9,  om:30, ch:16, cm:0  },
];

const SEG_UTC = [
  { name:'東京',    start:0,    end:6,    color:'#f59e0b', mkt:'asia'   },
  { name:'滬港',    start:1.5,  end:8,    color:'#fb923c', mkt:'asia'   },
  { name:'台灣',    start:1,    end:5.5,  color:'#a78bfa', mkt:'asia'   },
  { name:'倫敦/歐', start:7,    end:15.5, color:'#38bdf8', mkt:'europe' },
  { name:'紐約',    start:13.5, end:20,   color:'#4ade80', mkt:'us'     },
];

// col 0 = 亞洲欄, col 1 = 歐美欄
const STOCKS = [
  { sym:'^twii',  name:'台灣加權', sub:'TWSE', mkt:'TWSE', color:'#a78bfa', col:0 },
  { sym:'^nky',   name:'日經225',  sub:'TSE',  mkt:'TSE',  color:'#f59e0b', col:0 },
  { sym:'^hsi',   name:'恒生',     sub:'HKEX', mkt:'HKEX', color:'#fb923c', col:0 },
  { sym:'^sse',   name:'上證',     sub:'SSE',  mkt:'SSE',  color:'#ff6b6b', col:0 },
  { sym:'^kospi', name:'KOSPI',    sub:'KSE',  mkt:'KSE',  color:'#e879f9', col:0 },
  { sym:'^ftse',  name:'富時100',  sub:'LSE',  mkt:'LSE',  color:'#38bdf8', col:1 },
  { sym:'^dax',   name:'DAX',      sub:'FSE',  mkt:'FSE',  color:'#60a5fa', col:1 },
  { sym:'^spx',   name:'S&P 500',  sub:'NYSE', mkt:'NYSE', color:'#4ade80', col:1 },
  { sym:'^dji',   name:'道瓊',     sub:'NYSE', mkt:'NYSE', color:'#34d399', col:1 },
  { sym:'^ndq',   name:'NASDAQ',   sub:'NYSE', mkt:'NYSE', color:'#6ee7b7', col:1 },
  { sym:'^sox',   name:'費半SOX',  sub:'PHLX', mkt:'NYSE', color:'#fbbf24', col:1 },
];

const COMMODITIES = [
  { sym:'gc.f', name:'黃金',   unit:'oz',  icon:'🥇', dec:0 },
  { sym:'cl.f', name:'WTI原油', unit:'桶', icon:'🛢', dec:2 },
];

const FX_PAIRS = [
  { pair:'USD/TWD', from:'USD', to:'TWD', dec:2 },
  { pair:'USD/JPY', from:'USD', to:'JPY', dec:2 },
  { pair:'USD/CNY', from:'USD', to:'CNY', dec:4 },
  { pair:'USD/KRW', from:'USD', to:'KRW', dec:0 },
  { pair:'USD/HKD', from:'USD', to:'HKD', dec:4 },
  { pair:'USD/AUD', from:'USD', to:'AUD', dec:4 },
  { pair:'EUR/USD', from:'EUR', to:'USD', dec:4 },
  { pair:'GBP/USD', from:'GBP', to:'USD', dec:4 },
];

const CRYPTO = [
  { id:'bitcoin',     sym:'BTC',  icon:'₿' },
  { id:'ethereum',    sym:'ETH',  icon:'Ξ' },
  { id:'solana',      sym:'SOL',  icon:'◎' },
  { id:'ripple',      sym:'XRP',  icon:'✕' },
  { id:'binancecoin', sym:'BNB',  icon:'◈' },
  { id:'dogecoin',    sym:'DOGE', icon:'Ð' },
];

/* ══════════════════════════════════════════
   工具
══════════════════════════════════════════ */
function localDate(tz) {
  return new Date(new Date().toLocaleString('en-US', { timeZone: tz }));
}
function isOpen(mkt) {
  const m = MARKETS.find(x => x.id === mkt); if (!m) return false;
  const d = localDate(m.tz);
  if (d.getDay() === 0 || d.getDay() === 6) return false;
  const mins = d.getHours() * 60 + d.getMinutes();
  return mins >= m.oh * 60 + m.om && mins < m.ch * 60 + m.cm;
}
function openSet() {
  const s = new Set(); MARKETS.forEach(m => { if (isOpen(m.id)) s.add(m.id); }); return s;
}
function fmtNum(n, dec) {
  if (n == null || isNaN(n)) return '—';
  if (dec === 0) return Math.round(n).toLocaleString();
  return n.toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}
function chgClass(v) { return v > 0 ? 'up' : v < 0 ? 'dn' : 'nc'; }
function chgTxt(v)   { if (v == null) return '—'; return (v >= 0 ? '+' : '') + v.toFixed(2) + '%'; }

/* ══════════════════════════════════════════
   世界時鐘
══════════════════════════════════════════ */
function renderClocks() {
  const open = openSet();
  document.getElementById('clockBar').innerHTML = CITIES.map(c => {
    const d = localDate(c.tz);
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    const ss = String(d.getSeconds()).padStart(2,'0');
    const dayN = ['日','一','二','三','四','五','六'][d.getDay()];
    const on = open.has(c.mkt);
    return `<div class="wc">
      ${on ? '<div class="wc-open"></div>' : ''}
      <div class="wc-city">${c.city}</div>
      <div class="wc-time">${hh}:${mm}<span style="opacity:.45;font-size:.65em">:${ss}</span></div>
      <div class="wc-date">${d.getMonth()+1}/${d.getDate()} 週${dayN}</div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════
   市場時段 Timeline
══════════════════════════════════════════ */
function renderSession() {
  const now = new Date();
  const utcH = now.getUTCHours() + now.getUTCMinutes()/60;
  const pct = h => (h / 24 * 100).toFixed(2) + '%';
  const open = openSet();
  const asiaOn = ['TWSE','TSE','HKEX','SSE','KSE'].some(m => open.has(m));
  const euOn   = ['LSE','FSE'].some(m => open.has(m));
  const usOn   = open.has('NYSE');
  let bg;
  if (asiaOn && euOn && usOn)  bg = 'linear-gradient(155deg,#0d1a0d,#0d0d2a,#020b14)';
  else if (asiaOn && euOn)     bg = 'linear-gradient(155deg,#1a1000,#0a0a28,#020b14)';
  else if (euOn && usOn)       bg = 'linear-gradient(155deg,#001a0a,#0a0a28,#020b14)';
  else if (asiaOn)             bg = 'linear-gradient(155deg,#1a0e00,#04101a,#020b14)';
  else if (euOn)               bg = 'linear-gradient(155deg,#020b14,#0a0a28,#030616)';
  else if (usOn)               bg = 'linear-gradient(155deg,#001a08,#04101a,#020b14)';
  else                         bg = 'linear-gradient(155deg,#020b14,#030a10,#020b14)';
  document.getElementById('bg').style.background = bg;
  const segs = SEG_UTC.map(s => {
    const on = s.mkt==='asia'?asiaOn:s.mkt==='europe'?euOn:usOn;
    return `<div class="seg${on?' active':''}" style="left:${pct(s.start)};width:${pct(s.end-s.start)};background:${s.color}22;color:${s.color};border:1px solid ${s.color}44">${s.name}</div>`;
  }).join('');
  document.getElementById('sessionTrack').innerHTML =
    segs + `<div class="now-line" style="left:${(utcH/24*100).toFixed(2)}%"></div>`;
}

/* ══════════════════════════════════════════
   外匯（ExchangeRate-API）
══════════════════════════════════════════ */
let fxRates = null;
async function fetchForex() {
  try {
    const r = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
    if (!r.ok) throw new Error();
    fxRates = (await r.json()).rates;
    renderForex();
  } catch(e) {
    document.getElementById('forexList').innerHTML = '<div class="placeholder">外匯資料無法取得</div>';
  }
}
function renderForex() {
  if (!fxRates) return;
  document.getElementById('forexList').innerHTML = FX_PAIRS.map(fp => {
    const rate = fp.from === 'USD' ? fxRates[fp.to] : fxRates[fp.to] / fxRates[fp.from];
    return `<div class="row">
      <div class="lbl fx-lbl">${fp.pair}</div>
      <div class="val fx-val">${fmtNum(rate, fp.dec)}<span class="fx-unit">${fp.to}</span></div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════
   股市指數 + 大宗商品（Stooq.com）
   Stooq 是免費指數行情來源，不需要 API key，
   透過 CORS proxy 抓取 CSV 後解析
══════════════════════════════════════════ */
let stockData = {};
let commodityData = {};

function parseStooqCSV(text) {
  const result = {};
  const lines = text.trim().split('\n');
  // skip header if present
  const start = /^(symbol|ticker|date)/i.test(lines[0]) ? 1 : 0;
  for (let i = start; i < lines.length; i++) {
    const p = lines[i].split(',');
    if (p.length < 4) continue;
    const sym   = p[0].trim().toLowerCase();
    const open  = parseFloat(p[2]);
    const close = parseFloat(p[3]);
    if (!isNaN(open) && !isNaN(close) && open > 0 && close > 0) {
      result[sym] = { price: close, chg: (close - open) / open * 100 };
    }
  }
  return result;
}

async function fetchStooq() {
  const allSyms = [...STOCKS.map(s => s.sym), ...COMMODITIES.map(c => c.sym)].join(',');
  // f=sd2oc → Symbol, Date(YYYY-MM-DD), Open, Close
  const url = `https://stooq.com/q/l/?s=${allSyms}&f=sd2oc&h&e=csv`;

  const tries = [
    () => fetch('https://corsproxy.io/?' + encodeURIComponent(url)).then(r => { if(!r.ok) throw 0; return r.text(); }),
    () => fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url)).then(r => { if(!r.ok) throw 0; return r.text(); }),
    () => fetch('https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url)).then(r => { if(!r.ok) throw 0; return r.text(); }),
  ];

  let parsed = null;
  for (const fn of tries) {
    try {
      const text = await fn();
      if (!text || text.length < 10) continue;
      const tmp = parseStooqCSV(text);
      if (Object.keys(tmp).length) { parsed = tmp; break; }
    } catch(e) {}
  }

  if (!parsed) {
    ['stockCol0','stockCol1'].forEach(id =>
      document.getElementById(id).innerHTML = '<div class="placeholder">資料無法取得</div>');
    return;
  }

  STOCKS.forEach(s => { if (parsed[s.sym]) stockData[s.sym] = parsed[s.sym]; });
  COMMODITIES.forEach(c => { if (parsed[c.sym]) commodityData[c.sym] = parsed[c.sym]; });
  renderStocks();
  renderAssets();
}

function renderStocks() {
  const open = openSet();
  function makeRow(s) {
    const on    = open.has(s.mkt);
    const d     = stockData[s.sym];
    const price = d ? fmtNum(d.price, d.price > 999 ? 0 : 2) : '—';
    const pct   = d ? d.chg : null;
    const cls   = chgClass(pct);
    const glow  = on && d ? `box-shadow:0 0 10px ${s.color}55;border:1px solid ${s.color}33` : '';
    return `<div class="row${on?' open':''}" style="${glow}">
      <div class="stock-dot" style="background:${on?s.color:'rgba(255,255,255,.15)'}${on?';box-shadow:0 0 5px '+s.color:''}"></div>
      <div class="lbl stock-lbl"><div>${s.name}</div><div class="stock-name">${s.sub}</div></div>
      <div class="val">${price}</div>
      <div class="chg ${cls}">${chgTxt(pct)}</div>
      ${!on ? '<div class="closed-tag">休市</div>' : ''}
    </div>`;
  }
  const ph = '<div class="placeholder">連線中…</div>';
  const c0 = STOCKS.filter(s => s.col === 0).map(makeRow).join('');
  const c1 = STOCKS.filter(s => s.col === 1).map(makeRow).join('');
  document.getElementById('stockCol0').innerHTML = c0 || ph;
  document.getElementById('stockCol1').innerHTML = c1 || ph;
}

/* ══════════════════════════════════════════
   虛擬貨幣（CoinGecko）+ 大宗商品合併渲染
══════════════════════════════════════════ */
let cryptoData = {};

async function fetchCrypto() {
  const ids = CRYPTO.map(c => c.id).join(',');
  try {
    const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`);
    if (!r.ok) throw new Error();
    cryptoData = await r.json();
  } catch(e) {}
  renderAssets();
}

function renderAssets() {
  let html = '';

  // 大宗商品
  const commHtml = COMMODITIES.map(c => {
    const d   = commodityData[c.sym];
    const pct = d ? d.chg : null;
    const cls = chgClass(pct);
    const price = d ? '$' + fmtNum(d.price, c.dec) : '—';
    return `<div class="row">
      <div class="crypto-icon">${c.icon}</div>
      <div class="lbl crypto-lbl">${c.name}</div>
      <div class="val">${price}</div>
      <div class="chg ${cls}">${chgTxt(pct)}</div>
    </div>`;
  }).join('');
  if (commHtml) html += '<div class="asset-sep">大宗商品</div>' + commHtml;

  // 虛擬貨幣
  const cryptoHtml = CRYPTO.map(c => {
    const d   = cryptoData[c.id];
    const usd = d?.usd;
    const chg = d?.usd_24h_change;
    const cls = chgClass(chg);
    let disp = usd == null ? '—' : usd >= 1000 ? '$'+fmtNum(usd,0) : usd >= 1 ? '$'+fmtNum(usd,2) : '$'+usd.toFixed(5);
    return `<div class="row">
      <div class="crypto-icon">${c.icon}</div>
      <div class="lbl crypto-lbl">${c.sym}</div>
      <div class="val">${disp}</div>
      <div class="chg ${cls}">${chgTxt(chg)}</div>
    </div>`;
  }).join('');
  if (cryptoHtml) html += '<div class="asset-sep">虛擬貨幣</div>' + cryptoHtml;

  document.getElementById('cryptoList').innerHTML = html || '<div class="placeholder">連線中…</div>';
}

/* ══════════════════════════════════════════
   初始化
