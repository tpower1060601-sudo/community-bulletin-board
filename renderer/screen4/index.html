<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>即時天氣</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0c0b09; color: #fff;
  font-family: 'Inter','Microsoft JhengHei',sans-serif;
  height: 100vh; overflow: hidden; user-select: none;
}

/* ── 背景層 ── */
#bg { position: fixed; inset: 0; z-index: 0; transition: background 4s ease; background: linear-gradient(160deg,#1a1510,#0c0b09); }
#bg-fx { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
#bg-overlay { position: fixed; inset: 0; z-index: 2; background: rgba(0,0,0,.10); }

/* ── 佈局 ── */
.layout { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; padding: 24px 52px 16px; gap: 10px; }

/* 頂列 */
.topbar { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; position: relative; }
.city { position: absolute; left: 50%; transform: translateX(-50%); font-size: 54px; font-weight: 900; letter-spacing: 8px; text-shadow: 0 4px 24px rgba(0,0,0,.7); white-space: nowrap; }
.live-badge { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,.45); padding: 10px 26px; border-radius: 30px; border: 1px solid rgba(255,255,255,.12); font-size: 22px; letter-spacing: 2px; }
.live-dot { width: 12px; height: 12px; border-radius: 50%; background: #f59e0b; box-shadow: 0 0 10px rgba(245,158,11,.6); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(1.5)} }
.clock { font-size: 52px; font-weight: 700; letter-spacing: 2px; color: rgba(255,255,255,.9); min-width: 200px; text-align: right; }

/* 目前天氣 — 三欄：左(日照) 中(溫度) 右(統計) */
.current { flex: 1; min-height: 0; display: flex; align-items: stretch; gap: 20px; }

/* 左欄：日夜符號 */
.sun-panel { flex-shrink: 0; width: 480px; background: rgba(15,10,5,.5); border: 1px solid rgba(245,158,11,.15); border-radius: 20px; padding: 18px 20px 14px; backdrop-filter: blur(24px); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0; }
.sun-symbol { font-size: 130px; line-height: 1; filter: drop-shadow(0 0 32px rgba(251,191,36,.5)); animation: floatIcon 6s ease-in-out infinite; }
.sun-symbol.night { filter: drop-shadow(0 0 24px rgba(148,163,220,.4)); }
.sun-times { display: flex; justify-content: space-around; width: 100%; margin-top: 28px; }
.sun-time-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.sun-time-lbl { font-size: 20px; font-weight: 800; letter-spacing: 2px; color: rgba(255,255,255,.35); text-transform: uppercase; }
.sun-time-val { font-size: 42px; font-weight: 900; color: rgba(251,191,36,.95); letter-spacing: 2px; }

/* 中欄：天氣主資訊 */
.center-block { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
.weather-icon { font-size: 110px; line-height: 1; filter: drop-shadow(0 8px 28px rgba(255,255,255,.25)); animation: floatIcon 6s ease-in-out infinite; }
@keyframes floatIcon { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
.temp-main { font-size: 108px; font-weight: 900; line-height: 1; background: linear-gradient(180deg,#fff 40%,rgba(255,255,255,.55)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.temp-unit { font-size: 42px; -webkit-text-fill-color: rgba(255,255,255,.45); }
.desc { font-size: 36px; font-weight: 700; color: rgba(255,255,255,.8); letter-spacing: 5px; margin-top: 4px; }
.hl { font-size: 28px; color: rgba(255,255,255,.45); margin-top: 6px; letter-spacing: 2px; }
.hl .hi { color: #fbbf24; } .hl .lo { color: #60a5fa; }
.wind-row { display: flex; gap: 14px; margin-top: 14px; }
.wind-row .stat { flex: 1; min-width: 180px; text-align: center; padding: 12px 16px; }
.wind-row .stat .stat-lbl { font-size: 18px; }
.wind-row .stat .stat-val { font-size: 36px; }
.wind-row .stat .stat-unit { font-size: 20px; }

/* 右欄：6格資訊卡 (2×3) */
.stats { flex-shrink: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-content: center; }
.stat { background: rgba(15,10,5,.5); border: 1px solid rgba(245,158,11,.12); border-radius: 18px; padding: 16px 22px; backdrop-filter: blur(20px); }
.stat-lbl { font-size: 22px; color: rgba(255,255,255,.5); letter-spacing: 2px; font-weight: 700; }
.stat-val { font-size: 52px; font-weight: 900; margin-top: 8px; white-space: nowrap; }
.stat-unit { font-size: 24px; opacity: .55; font-weight: 600; }

/* 圖表 */
.chart-wrap { flex-shrink: 0; height: 280px; background: rgba(15,10,5,.5); border: 1px solid rgba(245,158,11,.12); border-radius: 24px; padding: 12px 24px 8px; backdrop-filter: blur(24px); box-sizing: border-box; }
.chart-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.chart-title { font-size: 20px; font-weight: 800; letter-spacing: 3px; color: rgba(255,255,255,.55); text-transform: uppercase; }
.chart-legend { display: flex; gap: 18px; font-size: 18px; color: rgba(255,255,255,.45); align-items: center; }
.leg-line { display: inline-block; width: 20px; height: 3px; border-radius: 2px; vertical-align: middle; margin-right: 5px; }
.leg-bar  { display: inline-block; width: 10px; height: 12px; border-radius: 2px; vertical-align: middle; margin-right: 5px; }
#fChart { width: 100%; height: 225px; display: block; }

.no-key { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 20px; color: rgba(255,255,255,.35); font-size: 26px; text-align: center; }

/* Twemoji 圖片尺寸 */
.weather-icon img.emoji { width: 110px; height: 110px; }
.sun-symbol img.emoji   { width: 120px; height: 120px; }
.sun-time-lbl img.emoji { width: 22px; height: 22px; vertical-align: middle; }
.stat-lbl img.emoji     { width: 22px; height: 22px; vertical-align: middle; }
.wind-row .stat-lbl img.emoji { width: 20px; height: 20px; vertical-align: middle; }
.chart-title img.emoji  { width: 18px; height: 18px; vertical-align: middle; }
.hl img.emoji           { width: 0; height: 0; display: none; }
.live-badge img.emoji   { width: 0; height: 0; display: none; }
</style>
</head>
<body>
<div id="bg"></div>
<div id="bg-fx"></div>
<div id="bg-overlay"></div>
<div class="layout" id="layout">
  <div style="margin:auto;color:rgba(255,255,255,.2);font-size:22px">載入中…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script src="../../shared/api.js"></script>
<script>
'use strict';
let settings = {}, clockEl = null, chartData = [], resizeTimer = null;

/* ── 時鐘 ── */
function tick() {
  if (!clockEl) return;
  const n = new Date();
  clockEl.textContent = String(n.getHours()).padStart(2,'0') + ':' +
    String(n.getMinutes()).padStart(2,'0') + ':' + String(n.getSeconds()).padStart(2,'0');
}
setInterval(tick, 1000);

/* ── 城市中文對照 ── */
const CITY_ZH = {
  'Taichung':'台中','Taipei':'台北','Kaohsiung':'高雄','Tainan':'台南',
  'Hsinchu':'新竹','Keelung':'基隆','Taoyuan':'桃園','Hualien':'花蓮',
  'Yilan':'宜蘭','Pingtung':'屏東','Chiayi':'嘉義','Changhua':'彰化',
  'Nantou':'南投','Miaoli':'苗栗','Yunlin':'雲林','Taitung':'台東',
  'Tokyo':'東京','Osaka':'大阪','Kyoto':'京都','Seoul':'首爾',
  'Beijing':'北京','Shanghai':'上海','Hong Kong':'香港',
  'Singapore':'新加坡','New York':'紐約','London':'倫敦',
  'Paris':'巴黎','Sydney':'雪梨','Los Angeles':'洛杉磯',
  'CWA_XITUN':'台中・西屯',
};

/* ── CWA 天氣代碼對照 ── */
const CWA_ICON = {
  1:'01',2:'02',3:'02',4:'03',5:'03',6:'03',7:'04',
  8:'50',9:'10',10:'10',11:'10',12:'10',13:'10',
  14:'11',15:'11',16:'11',17:'11',
  18:'50',19:'50',20:'50',
  21:'10',22:'11',23:'11',24:'10',
  25:'09',26:'11',27:'11',28:'11',29:'11',30:'11',
  31:'50',32:'50',33:'50'
};
const CWA_BG = {
  1:'clear',2:'clouds',3:'clouds',4:'clouds',5:'clouds',6:'clouds',7:'clouds',
  8:'mist',9:'drizzle',10:'drizzle',11:'drizzle',12:'drizzle',13:'drizzle',
  14:'thunderstorm',15:'thunderstorm',16:'thunderstorm',17:'thunderstorm',
  18:'mist',19:'mist',20:'mist',
  21:'rain',22:'thunderstorm',23:'thunderstorm',24:'drizzle',
  25:'rain',26:'thunderstorm',27:'thunderstorm',28:'thunderstorm',
  29:'thunderstorm',30:'thunderstorm',31:'mist',32:'mist',33:'mist'
};

/* ── 日出日落計算（台中 24.15°N, 120.67°E）── */
function calcSunTimes(date) {
  const doy = Math.floor((date - new Date(date.getFullYear(),0,0)) / 86400000);
  const latR = 24.15 * Math.PI / 180;
  const decl = 0.4093 * Math.sin(2 * Math.PI / 365 * (doy - 81));
  const cosHA = -Math.tan(latR) * Math.tan(decl);
  const ha = Math.acos(Math.max(-1, Math.min(1, cosHA)));
  const noon = 12 - 120.67 / 15 + 8;
  const srH = noon - ha * 12 / Math.PI;
  const ssH = noon + ha * 12 / Math.PI;
  function toTs(h) {
    const hrs = Math.floor(h), mins = Math.min(59, Math.round((h - hrs) * 60));
    return new Date(date.getFullYear(), date.getMonth(), date.getDate(), hrs, mins).getTime() / 1000;
  }
  return { sunrise: toTs(srH), sunset: toTs(ssH) };
}

/* ── 體感溫度計算 ── */
function calcFeelsLike(t, rh, ws) {
  if (t >= 27 && rh >= 40) {
    return Math.round((-8.785 + 1.611*t + 2.339*rh - 0.146*t*rh
      - 0.0123*t*t - 0.0164*rh*rh + 0.00221*t*t*rh
      + 0.00073*t*rh*rh - 0.0000036*t*t*rh*rh) * 10) / 10;
  }
  if (t <= 10 && ws > 1.3) {
    const wkm = ws * 3.6;
    return Math.round((13.12 + 0.6215*t - 11.37*Math.pow(wkm,0.16) + 0.3965*t*Math.pow(wkm,0.16)) * 10) / 10;
  }
  return t;
}

/* ── 常數 ── */
const ICONS = {
  '01d':'☀️','01n':'🌙','02d':'⛅','02n':'⛅','03d':'☁️','03n':'☁️',
  '04d':'☁️','04n':'☁️','09d':'🌧️','09n':'🌧️','10d':'🌦️','10n':'🌧️',
  '11d':'⛈️','11n':'⛈️','13d':'❄️','13n':'❄️','50d':'🌫️','50n':'🌫️'
};
const BG = {
  clear:'linear-gradient(155deg,#1a4a7a,#071528)',
  clouds:'linear-gradient(155deg,#1e1c18,#0c0b09)',
  rain:'linear-gradient(155deg,#12181e,#070a0d)',
  drizzle:'linear-gradient(155deg,#12181e,#070a0d)',
  snow:'linear-gradient(155deg,#1a1e28,#0c0e18)',
  thunderstorm:'linear-gradient(155deg,#0a0a0a,#030303)',
  mist:'linear-gradient(155deg,#1a1814,#0d0c0a)',
  fog:'linear-gradient(155deg,#1a1814,#0d0c0a)',
  default:'linear-gradient(155deg,#1a1510,#0c0b09)',
};

/* ── 背景動畫 ── */
function clearFx() { document.getElementById('bg-fx').innerHTML = ''; }
function injectStyle(id, css) {
  if (document.getElementById(id)) return;
  const s = document.createElement('style'); s.id = id; s.textContent = css; document.head.appendChild(s);
}
function mkEl(tag, styles) { const el = document.createElement(tag); Object.assign(el.style, styles); return el; }

function startRain(heavy) {
  injectStyle('kf-rain','@keyframes rDrop{0%{transform:translateY(-8px) skewX(-4deg);opacity:0}6%{opacity:1}93%{opacity:1}100%{transform:translateY(101vh) skewX(-4deg);opacity:0}}');
  const c = document.getElementById('bg-fx');
  for (let i = 0; i < (heavy?120:70); i++) {
    const opa = heavy ? .25+Math.random()*.35 : .15+Math.random()*.2;
    const w   = heavy ? (Math.random()<.3?2:1.5) : 1;
    const h   = heavy ? 28+Math.random()*18 : 16+Math.random()*10;
    c.appendChild(mkEl('div',{position:'absolute',left:Math.random()*100+'%',top:'-8px',width:w+'px',height:h+'px',background:'rgba(200,225,255,'+opa+')',borderRadius:'1px',animation:'rDrop '+(0.35+Math.random()*0.4)+'s '+(Math.random()*2.5)+'s linear infinite'}));
  }
}
function startSnow() {
  injectStyle('kf-snow','@keyframes sFlake{0%{transform:translateY(-20px) translateX(0);opacity:0}8%{opacity:1}92%{opacity:1}100%{transform:translateY(101vh) translateX(25px);opacity:0}}');
  const c = document.getElementById('bg-fx');
  '❄❅❆•••'.split('').forEach(ch => {
    for (let j=0;j<5;j++) { const sz=10+Math.random()*14; c.appendChild(Object.assign(mkEl('div',{position:'absolute',left:Math.random()*100+'%',top:'-20px',fontSize:sz+'px',color:'rgba(200,230,255,.18)',animation:'sFlake '+(4+Math.random()*6)+'s '+(Math.random()*7)+'s linear infinite'}),{textContent:ch})); }
  });
}
function startSun() {
  injectStyle('kf-sun','@keyframes sunP{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.18);opacity:.6}} @keyframes sunR{0%,100%{opacity:.3;width:200px}50%{opacity:.7;width:300px}}');
  const c = document.getElementById('bg-fx');
  c.appendChild(mkEl('div',{position:'absolute',right:'7%',top:'4%',width:'280px',height:'280px',borderRadius:'50%',background:'radial-gradient(circle,rgba(255,210,60,.1) 0%,transparent 68%)',animation:'sunP 4.5s ease-in-out infinite'}));
  for (let i=0;i<8;i++) c.appendChild(mkEl('div',{position:'absolute',right:'calc(7% + 120px)',top:'calc(4% + 120px)',width:'200px',height:'1px',transformOrigin:'0 50%',background:'linear-gradient(90deg,transparent,rgba(255,210,60,.07))',transform:'rotate('+(i*45)+'deg)',animation:'sunR 7s '+(i*0.9)+'s ease-in-out infinite'}));
}
function startClouds() {
  injectStyle('kf-cloud','@keyframes cDrift{from{transform:translateX(-320px)}to{transform:translateX(115vw)}}');
  const c = document.getElementById('bg-fx');
  // [寬, top位置, 動畫秒數, 不透明度, 高度]
  const configs = [
    [240, '5%',  28, .13, 60],
    [320, '12%', 38, .10, 72],
    [180, '2%',  22, .15, 52],
    [280, '20%', 34, .09, 64],
    [200, '8%',  42, .11, 56],
    [360, '16%', 50, .08, 80],
  ];
  configs.forEach(([w, top, dur, opa, h], i) => {
    // 主雲體
    const cloud = mkEl('div', {
      position: 'absolute', top: top,
      width: w + 'px', height: h + 'px',
      borderRadius: '50px',
      background: `rgba(200,220,240,${opa})`,
      filter: 'blur(18px)',
      animation: `cDrift ${dur + i * 4}s ${-Math.random() * 30}s linear infinite`
    });
    c.appendChild(cloud);
    // 上方隆起（讓雲更有積雲感）
    const bump = mkEl('div', {
      position: 'absolute', top: top,
      left: (Math.random() * w * 0.3) + 'px',
      width: (w * 0.5) + 'px', height: (h * 0.8) + 'px',
      borderRadius: '50%',
      background: `rgba(210,225,245,${opa * 0.7})`,
      filter: 'blur(22px)',
      animation: `cDrift ${dur + i * 4}s ${-Math.random() * 30}s linear infinite`
    });
    c.appendChild(bump);
  });
}
function startThunder() {
  startRain(true);
  injectStyle('kf-lt','@keyframes ltFl{0%{opacity:0}15%{opacity:1}30%{opacity:0}55%{opacity:.6}100%{opacity:0}}');
  function flash() {
    const f = mkEl('div',{position:'absolute',inset:'0',background:'rgba(180,210,255,.06)',animation:'ltFl .2s ease-out forwards'});
    document.getElementById('bg-fx').appendChild(f);
    setTimeout(()=>f.remove(),400);
    setTimeout(flash, 5000+Math.random()*9000);
  }
  setTimeout(flash, 2500);
}
function applyBg(m) {
  clearFx();
  document.getElementById('bg').style.background = BG[m] || BG.default;
  if (m==='clear') startSun();
  else if (m==='clouds') startClouds();
  else if (m==='rain') startRain(true);
  else if (m==='drizzle') startRain(false);
  else if (m==='snow') startSnow();
  else if (m==='thunderstorm') startThunder();
}

/* ── 風向 ── */
function degToCompass(deg) {
  const d = ['北','北北東','東北','東北東','東','東南東','東南','南南東','南','南南西','西南','西南西','西','西北西','西北','北北西'];
  return d[Math.round((deg||0) / 22.5) % 16];
}

/* ── 日夜符號面板 ── */
function buildDayNight(sunriseTs, sunsetTs, nowTs) {
  const fmt = ts => { const d=new Date(ts*1000); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); };
  const isDay = nowTs >= sunriseTs && nowTs <= sunsetTs;
  return `
    <div class="sun-symbol${isDay ? '' : ' night'}">${isDay ? '☀️' : '🌙'}</div>
    <div class="sun-times">
      <div class="sun-time-item">
        <div class="sun-time-lbl">🌅 日出</div>
        <div class="sun-time-val">${fmt(sunriseTs)}</div>
      </div>
      <div class="sun-time-item">
        <div class="sun-time-lbl">🌇 日落</div>
        <div class="sun-time-val">${fmt(sunsetTs)}</div>
      </div>
    </div>`;
}

/* ── 圖表（Canvas）── */
function roundRectPath(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawChart(canvas, data) {
  if (!data || data.length < 2) return;
  const W = canvas.offsetWidth; if (!W) return;
  const DPR = window.devicePixelRatio || 1;
  const H = canvas.offsetHeight || 225;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);
  const cw = W, ch = canvas.offsetHeight;
  const PAD = { l:60, r:60, t:28, b:42 };
  const gW = cw - PAD.l - PAD.r, gH = ch - PAD.t - PAD.b;
  const temps = data.map(d=>d.temp), pops = data.map(d=>d.pop*100), labels = data.map(d=>d.time);
  const n = data.length;
  const tMin = Math.min(...temps)-2, tMax = Math.max(...temps)+2;
  const xOf = i => PAD.l + i*(gW/(n-1));
  const yOfT = t => PAD.t + gH - ((t-tMin)/(tMax-tMin))*gH;
  const yOfP = p => PAD.t + gH - (p/100)*gH;

  pops.forEach((p,i) => {
    if (p<5) return;
    const x=xOf(i), bW=(gW/(n-1))*0.45, bH=(p/100)*gH;
    const grd=ctx.createLinearGradient(0,PAD.t+gH-bH,0,PAD.t+gH);
    grd.addColorStop(0,'rgba(96,165,250,.32)'); grd.addColorStop(1,'rgba(96,165,250,.04)');
    ctx.fillStyle=grd; roundRectPath(ctx,x-bW/2,PAD.t+gH-bH,bW,bH,4); ctx.fill();
  });
  ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1;
  [0,.25,.5,.75,1].forEach(f=>{ const y=PAD.t+f*gH; ctx.beginPath(); ctx.moveTo(PAD.l,y); ctx.lineTo(cw-PAD.r,y); ctx.stroke(); });

  const fGrd=ctx.createLinearGradient(0,PAD.t,0,PAD.t+gH);
  fGrd.addColorStop(0,'rgba(251,146,60,.22)'); fGrd.addColorStop(1,'rgba(251,146,60,.01)');
  ctx.beginPath(); ctx.moveTo(xOf(0),PAD.t+gH); ctx.lineTo(xOf(0),yOfT(temps[0]));
  for (let i=1;i<n;i++) { const cp=gW/(n-1)*0.42; ctx.bezierCurveTo(xOf(i-1)+cp,yOfT(temps[i-1]),xOf(i)-cp,yOfT(temps[i]),xOf(i),yOfT(temps[i])); }
  ctx.lineTo(xOf(n-1),PAD.t+gH); ctx.closePath(); ctx.fillStyle=fGrd; ctx.fill();

  ctx.beginPath(); ctx.moveTo(xOf(0),yOfT(temps[0]));
  for (let i=1;i<n;i++) { const cp=gW/(n-1)*0.42; ctx.bezierCurveTo(xOf(i-1)+cp,yOfT(temps[i-1]),xOf(i)-cp,yOfT(temps[i]),xOf(i),yOfT(temps[i])); }
  ctx.strokeStyle='rgba(251,146,60,.95)'; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.stroke();

  temps.forEach((t,i) => {
    const x=xOf(i), y=yOfT(t);
    ctx.beginPath(); ctx.arc(x,y,4.5,0,Math.PI*2); ctx.fillStyle='#fb923c'; ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.92)'; ctx.font='bold 15px Inter,sans-serif'; ctx.textAlign='center';
    ctx.fillText(Math.round(t)+'°', x, y-12);
  });
  pops.forEach((p,i) => {
    if (p<10) return;
    const x=xOf(i), y=yOfP(p);
    ctx.fillStyle='rgba(147,197,253,.85)'; ctx.font='13px Inter,sans-serif'; ctx.textAlign='center';
    ctx.fillText(Math.round(p)+'%', x, Math.max(y-7,PAD.t+17));
  });
  ctx.fillStyle='rgba(255,255,255,.42)'; ctx.font='14px Inter,sans-serif';
  labels.forEach((lbl,i)=>{ ctx.textAlign='center'; ctx.fillText(lbl,xOf(i),ch-6); });
  ctx.fillStyle='rgba(255,255,255,.28)'; ctx.font='13px Inter,sans-serif'; ctx.textAlign='right';
  [0,.25,.5,.75,1].forEach(f=>{ const t=tMin+(tMax-tMin)*(1-f); ctx.fillText(Math.round(t)+'°',PAD.l-7,PAD.t+f*gH+4); });
}

/* ── 渲染主畫面 ── */
function render(cur, forecast, dayHigh, dayLow, extra) {
  const icon    = ICONS[cur.weather[0].icon] || '🌡️';
  const main    = cur.weather[0].main;
  const desc    = cur.weather[0].description;
  const compass = degToCompass(extra.windDeg);
  const sunArc  = buildDayNight(extra.sunrise, extra.sunset, Date.now() / 1000);

  applyBg(main.toLowerCase());

  document.getElementById('layout').innerHTML = `
    <div class="topbar">
      <div class="live-badge"><span class="live-dot"></span>&nbsp;LIVE WEATHER</div>
      <div class="city">${CITY_ZH[cur.name] || cur.name}</div>
      <div class="clock" id="clockEl">--:--:--</div>
    </div>
    <div class="current">
      <div class="sun-panel">
        ${sunArc}
      </div>
      <div class="center-block">
        <div class="weather-icon">${icon}</div>
        <div class="temp-main">${Math.round(cur.main.temp)}<span class="temp-unit">°C</span></div>
        <div class="desc">${desc}</div>
        <div class="hl">最高 <span class="hi">${dayHigh}°C</span>&nbsp;／&nbsp;最低 <span class="lo">${dayLow}°C</span></div>
        <div class="wind-row">
          <div class="stat"><div class="stat-lbl">🧭 風向</div><div class="stat-val">${compass}</div></div>
          <div class="stat"><div class="stat-lbl">💨 陣風</div><div class="stat-val">${extra.windGust != null ? extra.windGust.toFixed(1) : '—'}<span class="stat-unit"> m/s</span></div></div>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-lbl">💧 濕度</div><div class="stat-val">${cur.main.humidity}<span class="stat-unit">%</span></div></div>
        <div class="stat"><div class="stat-lbl">🌡️ 體感</div><div class="stat-val">${Math.round(cur.main.feels_like)}<span class="stat-unit">°C</span></div></div>
        <div class="stat"><div class="stat-lbl">🔵 氣壓</div><div class="stat-val">${cur.main.pressure}<span class="stat-unit"> hPa</span></div></div>
        <div class="stat"><div class="stat-lbl">💨 風速</div><div class="stat-val">${cur.wind.speed}<span class="stat-unit"> m/s</span></div></div>
        <div class="stat"><div class="stat-lbl">👁️ 能見度</div><div class="stat-val">${((cur.visibility||0)/1000).toFixed(1)}<span class="stat-unit"> km</span></div></div>
        <div class="stat"><div class="stat-lbl">☁️ 雲量</div><div class="stat-val">${extra.clouds}<span class="stat-unit">%</span></div></div>
      </div>
    </div>
    <div class="chart-wrap">
      <div class="chart-head">
        <div class="chart-title">⏱ 未來 24 小時預報</div>
        <div class="chart-legend">
          <span><span class="leg-line" style="background:#fb923c"></span>溫度</span>
          <span><span class="leg-bar" style="background:rgba(96,165,250,.5)"></span>降雨概率</span>
        </div>
      </div>
      <canvas id="fChart" height="225"></canvas>
    </div>`;

  clockEl = document.getElementById('clockEl');
  tick();
  chartData = forecast;
  requestAnimationFrame(() => { const c = document.getElementById('fChart'); if (c) drawChart(c, chartData); });
  // Emoji 轉圖片（相容 Windows 7）
  if (window.twemoji) twemoji.parse(document.getElementById('layout'), { folder: 'svg', ext: '.svg' });
}

/* ── CWA 中央氣象局 API ── */
async function fetchWeatherCWA() {
  const key = settings.cwaKey;
  const BASE = 'https://opendata.cwa.gov.tw/api/v1/rest/datastore';
  try {
    const [obsRes, fcRes] = await Promise.all([
      fetch(BASE + '/O-A0003-001?Authorization=' + key + '&StationId=467490&format=JSON'),
      fetch(BASE + '/F-D0047-075?Authorization=' + key + '&locationName=' + encodeURIComponent('西屯區') + '&elementName=Wx,T,PoP6h,AT&format=JSON')
    ]);
    const obsData = await obsRes.json();
    const fcData  = await fcRes.json();
    if (obsData.success !== 'true') throw new Error('觀測站資料異常');

    const we       = obsData.records.Station[0].WeatherElement;
    const temp     = parseFloat(we.AirTemperature);
    const humidity = parseFloat(we.RelativeHumidity);
    const windSpeed= parseFloat(we.WindSpeed);
    const windDir  = parseFloat(we.WindDirection);
    const pressure = parseFloat(we.AirPressure);
    const desc     = we.Weather || '—';
    const dailyHigh= we.DailyHigh?.TemperatureMax ? parseFloat(we.DailyHigh.TemperatureMax) : temp;
    const dailyLow = we.DailyLow?.TemperatureMin  ? parseFloat(we.DailyLow.TemperatureMin)  : temp;
    const visRaw   = String(we.Visibility || '');
    const visibility = visRaw.includes('以上') ? 10000 : (parseFloat(visRaw) || 10) * 1000;

    const loc = fcData.records?.locations?.[0]?.location?.[0];
    let wxCode = 4, forecastPts = [], feelsLike = calcFeelsLike(temp, humidity, windSpeed);

    if (loc) {
      const elMap = {};
      loc.weatherElement.forEach(el => { elMap[el.elementName] = el.time; });

      const wxTimes = elMap['Wx'] || [];
      if (wxTimes[0]) {
        const vals = wxTimes[0].elementValue;
        wxCode = parseInt(vals.length > 1 ? vals[1].value : vals[0].value) || 4;
      }

      const atTimes = elMap['AT'] || [];
      if (atTimes[0]) feelsLike = parseFloat(atTimes[0].elementValue[0].value) || feelsLike;

      const tTimes   = elMap['T']     || [];
      const popTimes = elMap['PoP6h'] || [];
      const now = Date.now();
      tTimes.slice(0, 12).forEach(t => {
        const st = new Date(t.startTime.replace(' ', 'T'));
        if (st.getTime() < now - 1800000) return;
        const tVal = parseFloat(t.elementValue[0].value);
        if (isNaN(tVal)) return;
        let pop = 0;
        popTimes.forEach(p => {
          const ps = new Date(p.startTime.replace(' ', 'T'));
          const pe = new Date(p.endTime.replace(' ', 'T'));
          if (st >= ps && st < pe) pop = (parseFloat(p.elementValue[0].value) || 0) / 100;
        });
        if (forecastPts.length < 8) forecastPts.push({ time: String(st.getHours()).padStart(2,'0') + ':00', temp: tVal, pop });
      });
    }

    const nowDate = new Date();
    const pts = [{
      time: String(nowDate.getHours()).padStart(2,'0') + ':' + String(nowDate.getMinutes()).padStart(2,'0'),
      temp, pop: parseFloat(we.Now?.Precipitation || 0) > 0 ? 0.7 : 0
    }, ...forecastPts];

    const sunTimes = calcSunTimes(new Date());
    const isDay    = Date.now()/1000 >= sunTimes.sunrise && Date.now()/1000 <= sunTimes.sunset;
    const iconCode = (CWA_ICON[wxCode] || '04') + (isDay ? 'd' : 'n');
    const bgType   = CWA_BG[wxCode] || 'clouds';
    const allTemps = pts.map(p => p.temp);
    const fcHigh   = Math.round(Math.max(...allTemps, dailyHigh));
    const fcLow    = Math.round(Math.min(...allTemps, dailyLow));

    const cur = {
      name: 'CWA_XITUN',
      weather: [{ icon: iconCode, main: bgType, description: desc }],
      main: { temp, feels_like: feelsLike, humidity, pressure, temp_max: dailyHigh, temp_min: dailyLow },
      wind: { speed: windSpeed, deg: windDir, gust: null },
      visibility,
      clouds: { all: Math.round(humidity > 85 ? 90 : humidity > 65 ? 55 : 20) }
    };
    render(cur, pts, fcHigh, fcLow, {
      sunrise: sunTimes.sunrise, sunset: sunTimes.sunset,
      windDeg: windDir, windGust: null, pressure, clouds: cur.clouds.all
    });
  } catch(e) {
    console.error('[CWA]', e);
    document.getElementById('layout').innerHTML =
      `<div class="no-key">⚠️ 中央氣象局資料取得失敗<br><small style="opacity:.45">${e.message}</small></div>`;
  }
}

/* ── OpenWeather API（備用）── */
async function fetchWeather() {
  const key = settings.weatherApiKey, city = settings.weatherCity || 'Taipei';
  if (!key) {
    document.getElementById('layout').innerHTML = '<div class="no-key">💡 請至管理後台設定天氣 API Key<br><small style="font-size:16px;opacity:.4;margin-top:10px;display:block">openweathermap.org（免費）</small></div>';
    return;
  }
  try {
    const base = 'https://api.openweathermap.org/data/2.5';
    const q    = `q=${encodeURIComponent(city)}&appid=${key}&units=metric&lang=zh_tw`;
    const [cRes, fRes] = await Promise.all([fetch(`${base}/weather?${q}`), fetch(`${base}/forecast?${q}`)]);
    const cur = await cRes.json();
    if (!cRes.ok) throw new Error(cur.message || 'API error');
    const fc  = await fRes.json();
    const now = Date.now() / 1000;
    const nowH = new Date();
    const currentPt = {
      time: String(nowH.getHours()).padStart(2,'0') + ':' + String(nowH.getMinutes()).padStart(2,'0'),
      temp: cur.main.temp,
      pop: 0
    };
    const futurePts = (fc.list||[]).filter(d=>d.dt>now).slice(0,8).map(d=>{
      const h=new Date(d.dt*1000);
      return { time:String(h.getHours()).padStart(2,'0')+':00', temp:d.main.temp, pop:d.pop||0 };
    });
    const pts = [currentPt, ...futurePts];
    const fcTemps = pts.map(d=>d.temp);
    const dayHigh = fcTemps.length ? Math.round(Math.max(...fcTemps)) : Math.round(cur.main.temp_max);
    const dayLow  = fcTemps.length ? Math.round(Math.min(...fcTemps)) : Math.round(cur.main.temp_min);
    const extra = {
      sunrise:  cur.sys.sunrise,
      sunset:   cur.sys.sunset,
      windDeg:  cur.wind.deg || 0,
      windGust: cur.wind.gust != null ? cur.wind.gust : null,
      pressure: cur.main.pressure,
      clouds:   cur.clouds ? cur.clouds.all : 0,
    };
    render(cur, pts, dayHigh, dayLow, extra);
  } catch(e) {
    document.getElementById('layout').innerHTML = `<div class="no-key">⚠️ 無法取得天氣資料<br><small style="opacity:.45">${e.message}</small></div>`;
  }
}

window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { const c=document.getElementById('fChart'); if(c&&chartData.length) drawChart(c,chartData); }, 200);
});

function doFetch() {
  if (settings.cwaKey && settings.cwaKey.startsWith('CWA-')) {
    fetchWeatherCWA();
  } else {
    fetchWeather();
  }
}
async function init() {
  if (window.ghBackup) await window.ghBackup.autoRestore();
  settings = await window.api.get('settings');
  doFetch();
  setInterval(doFetch, 10 * 60 * 1000);
}
window.api.on('settings:updated', s => { settings = s; doFetch(); });
init();
</script>
