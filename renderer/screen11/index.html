var PAGE_MS = 10000;  // 每頁停留毫秒（10000 = 10 秒）

// ──────────────────────────────────────────────────────
// 系統程式碼，請勿修改以下內容
// ──────────────────────────────────────────────────────
var PG=16,bd=document.getElementById('bd'),pgs=[],sl=[];
for(var j=0;j<DATA.length;j+=PG)pgs.push(DATA.slice(j,j+PG));
if(!pgs.length)pgs.push([]);
while(pgs[pgs.length-1].length<PG)pgs[pgs.length-1].push({floor:'',company:''});
for(var i=0;i<PG;i++){
  var e=document.createElement('div');e.className='sl';
  e.innerHTML='<div class="bg"><div class="fl"></div><div class="co"></div></div>'
    +'<div class="bc"><div class="fl"></div><div class="co"></div></div>'
    +'<div class="th"><div class="in"><div class="fl"></div><div class="co"></div></div></div>'
    +'<div class="bf" style="transform:perspective(900px) rotateX(-90deg)"><div class="in"><div class="fl"></div><div class="co"></div></div></div>'
    +'<div class="dv"></div>';
  bd.appendChild(e);
  sl.push({bg:e.querySelector('.bg'),bc:e.querySelector('.bc'),
    th:e.querySelector('.th'),thi:e.querySelector('.th .in'),
    bf:e.querySelector('.bf'),bfi:e.querySelector('.bf .in')});
}
function sc(el,f,c){el.querySelector('.fl').textContent=f||'';el.querySelector('.co').textContent=c||'';el.style.opacity=(f||c)?'1':'0.06';}
function initSlots(pi){pgs[pi].forEach(function(d,i){var s=sl[i];sc(s.bg,d.floor,d.company);sc(s.bc,d.floor,d.company);sc(s.thi,d.floor,d.company);sc(s.bfi,d.floor,d.company);s.th.style.transition='none';s.th.style.transform='';s.bf.style.transition='none';s.bf.style.transform='perspective(900px) rotateX(-90deg)';});}
function flipRow(s,f,c,done){sc(s.bg,f,c);sc(s.bfi,f,c);s.bf.style.transition='none';s.bf.style.transform='perspective(900px) rotateX(-90deg)';requestAnimationFrame(function(){s.th.style.transition='transform 0.28s ease-in';s.th.style.transform='perspective(900px) rotateX(-90deg)';setTimeout(function(){s.bf.style.transition='transform 0.28s ease-out';s.bf.style.transform='perspective(900px) rotateX(0deg)';setTimeout(function(){sc(s.bc,f,c);sc(s.thi,f,c);s.th.style.transition='none';s.th.style.transform='';s.bf.style.transition='none';s.bf.style.transform='perspective(900px) rotateX(-90deg)';if(done)done();},360);},200);});}
var cur=0;initSlots(0);
(function run(){if(pgs.length<=1)return;var nxt=(cur+1)%pgs.length;setTimeout(function(){for(var i=0;i<PG;i++){(function(idx){var d=pgs[nxt][idx];setTimeout(function(){flipRow(sl[idx],d.floor,d.company,idx===PG-1?function(){cur=nxt;run();}:null);},idx*STAGGER);})(i);}},PAGE_MS);})();
